<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Mars Golf</title>
<style>
  html,body{margin:0;height:100%;background:#0e1018;overflow:hidden}
  canvas{display:block;cursor:crosshair}
  #hud{position:fixed;top:10px;left:50%;transform:translateX(-50%);font:20px monospace;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.5);pointer-events:none}
  #help{position:fixed;bottom:10px;left:14px;font:12px monospace;color:rgba(255,255,255,.6);pointer-events:none}
</style></head>
<body><canvas id="c"></canvas><div id="hud"></div><div id="help">drag from ball to aim · release to shoot · R = new course</div>
<script>
// ── Mars Golf — built to docs/MARSGOLF-REQUIREMENTS.md, targets in docs/gom-targets/ ────────────────
// ANGULAR faceted heightfield (single-valued — matches the user's GoM targets: multi-level peaks/plateaus/
// valleys, gaps, WATER hazards in valleys; one biome colour per hole). Continuous course: sink → the cup
// FILLS while the camera PANS to the next hole (the exact 90-frame ease-in-out + fill + ball-rise + flag-
// fade ported from the existing game's STATE_TRANSITION). Cup reachable by construction (cup on the single
// surface); a quick sim still validates each at gen. No overhangs (not in the targets).

const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let VW=0,VH=0; function resize(){VW=cv.width=innerWidth;VH=cv.height=innerHeight;} addEventListener('resize',resize); resize();
const G=0.42,BR=7,REST=0.6,RESTIT=0.38,ROLL=0.985,FRIC=0.07,MAXV=29,CW=46,CD=18,TRANS=90,BOTTOM=6000;
const rnd=(a,b)=>a+Math.random()*(b-a),clamp=(v,a,b)=>v<a?a:v>b?b:v,lerp=(a,b,t)=>a+(b-a)*t;
const BIOMES=[ {g:'#5e63b8',s:'#9a9fdf'},{g:'#5ba24e',s:'#aed293'},{g:'#3f97a8',s:'#92c3cd'},{g:'#cf6a86',s:'#e7a9b9'},{g:'#7a9a3f',s:'#c3d2a0'},{g:'#c06a3a',s:'#dcb08c'} ];
const WATER='#4fb3e0';

let floorPts=[],holes=[],waters=[];        // floorPts {x,y}; holes {cupX,cupY,fill,sunk,biome,num}; waters {x0,x1,y}
let cur=0,state='aim',tt=0,camS={x:0,y:0},camE={x:0,y:0};
let cam={x:0,y:0};

// ── floor height + current-hole cup divot ──
function floorYAt(x){const P=floorPts; if(x<=P[0].x)return P[0].y; if(x>=P[P.length-1].x)return P[P.length-1].y;
  let lo=0,hi=P.length-1; while(hi-lo>1){const m=(lo+hi)>>1; if(P[m].x<x)lo=m; else hi=m;} const a=P[lo],b=P[hi]; return lerp(a.y,b.y,(x-a.x)/((b.x-a.x)||1));}
function divot(x,h){ if(!h||h.fill>=1)return 0; const dx=Math.abs(x-h.cupX); if(dx>CW/2)return 0; const t=dx/(CW/2); return CD*(1-t*t)*(1-h.fill);}
function surfYAt(x){ let y=floorYAt(x); const h=holes[cur]; if(h)y+=divot(x,h); return y; }
function waterAt(x){ for(const w of waters) if(x>=w.x0&&x<=w.x1) return w.y; return null; }

// ── physics on a ball ──
function nb(x,y){return{x,y,vx:0,vy:0,ground:false,slow:0};}
function collide(b){ const sy=surfYAt(b.x);
  if(b.y>sy-BR){ b.y=sy-BR; const s=(surfYAt(b.x+4)-surfYAt(b.x-4))/8,nl=Math.hypot(s,1),nx=-s/nl,ny=-1/nl,dot=b.vx*nx+b.vy*ny;
    if(dot<0){b.vx-=(1+RESTIT)*dot*nx; b.vy-=(1+RESTIT)*dot*ny;} b.vx+=s*G*0.7; b.vx*=ROLL; b.ground=true; } else b.ground=false; }
function tickBall(b,cupX){ for(let s=0;s<2;s++){b.vy+=G/2;b.x+=b.vx/2;b.y+=b.vy/2;collide(b);} const sp=Math.hypot(b.vx,b.vy);
  if(b.ground&&sp>FRIC){b.vx-=b.vx/sp*FRIC;b.vy-=b.vy/sp*FRIC;}
  const w=waterAt(b.x); if(w!=null&&b.y>w-BR) return 'water'; if(b.y>BOTTOM) return 'oob';
  if(b.ground&&sp<REST){b.slow++; if(b.slow>3){b.vx=b.vy=0; return Math.abs(b.x-cupX)<CW*0.42?'sink':'rest';}} else b.slow=0; return 'flight'; }

// quick reachability (same physics, sim ball) — cup is on the one surface so this rarely rejects
function solvable(tx,ty,cupX){ for(let a=0;a<11;a++){const lo=0.18+a/10*1.15; for(let p=0;p<9;p++){const pw=7+p/8*(MAXV-7);
  const b=nb(tx,ty-2); b.vx=Math.cos(lo)*pw; b.vy=-Math.sin(lo)*pw; for(let f=0;f<520;f++){const r=tickBall(b,cupX); if(r==='sink')return true; if(r==='water'||r==='oob')break; if(r==='rest'){ if(Math.abs(b.x-cupX)<CW)return true; break; }}}} return false; }

// ── generation: angular multi-level heightfield, valleys may hold water, cup on a flat green ──
function genHole(x0,y0,c){ const pts=[{x:x0,y:y0}]; const span=rnd(640,880),endX=x0+span; let x=x0,y=y0; const drama=70+c*230; let water=null;
  while(x<endX-260){ const step=rnd(80,150),roll=Math.random();
    if(roll<0.30){x+=step;pts.push({x,y});}                                              // flat
    else if(roll<0.58){x+=step; y=clamp(y+rnd(-drama,drama)*0.5,VH*0.22,VH*0.80); pts.push({x,y});} // slope
    else if(roll<0.80){const ny=clamp(y+(Math.random()<0.5?-1:1)*rnd(drama*0.6,drama),VH*0.18,VH*0.82); x+=rnd(6,22); pts.push({x,y:ny}); y=ny; x+=step*0.5; pts.push({x,y});} // cliff
    else { // VALLEY (deep dip) — may fill with water
      const vd=rnd(drama*0.9,drama*1.5), vx0=x+step*0.4; x+=step*0.4; pts.push({x,y}); const vy=clamp(y+vd,VH*0.45,VH*0.92);
      x+=rnd(40,90); pts.push({x,y:vy}); const vx1=x; x+=rnd(40,90); pts.push({x,y:vy}); x+=step*0.4; pts.push({x,y});
      if(c>0.35&&Math.random()<0.6) water={x0:vx0,x1:vx1,y:vy-rnd(6,18)};
    }
  }
  x=Math.min(x+rnd(60,110),endX); pts.push({x,y}); const cupX=x+50; x=cupX+60; pts.push({x:cupX-40,y}); pts.push({x,y});
  return {pts,cupX,cupY:y,endX:x,water};
}
function buildCourse(){ floorPts=[];holes=[];waters=[];cur=0; let x=40,y=VH*0.5; floorPts.push({x:0,y},{x,y});
  for(let h=0;h<9;h++){ const c=clamp(0.08+h*0.12,0.08,0.97); const tx=holes.length?holes[holes.length-1].cupX:40, ty=holes.length?holes[holes.length-1].cupY:y; let seg=null,wat=null;
    for(let att=0;att<24;att++){ const snap=floorPts.length,snapW=waters.length; const s=genHole(x,y,c); for(const p of s.pts)floorPts.push(p); if(s.water)waters.push(s.water);
      const savedCur=cur; holes.push({cupX:s.cupX,cupY:s.cupY,fill:0,sunk:false,biome:(h/2|0)%BIOMES.length,num:h+1}); cur=holes.length-1;
      const ok=solvable(tx,floorYAt(tx)-BR,s.cupX); cur=savedCur;
      if(ok){seg=s;break;} holes.pop(); floorPts.length=snap; waters.length=snapW; }
    if(!seg){const s=genHole(x,y,0.1); for(const p of s.pts)floorPts.push(p); holes.push({cupX:s.cupX,cupY:s.cupY,fill:0,sunk:false,biome:(h/2|0)%BIOMES.length,num:h+1}); seg=s;}
    x=seg.endX; y=seg.cupY; }
  floorPts.push({x:x+600,y}); }

// ── camera: static per-hole framing (existing setHoleCamera feel), horizontal + gentle vertical ──
function frameFor(i){ const h=holes[i]; const teeX=i===0?40:holes[i-1].cupX; const margin=120; let cx=teeX-margin;
  if(h.cupX-cx>VW-margin) cx=(teeX+h.cupX)/2-VW/2;
  // vertical: center the span tee..cup
  let mn=1e9,mx=-1e9; for(let xx=Math.min(teeX,h.cupX)-40;xx<=Math.max(teeX,h.cupX)+40;xx+=30){const yy=floorYAt(xx); mn=Math.min(mn,yy); mx=Math.max(mx,yy);}
  let cy=(mn+mx)/2-VH/2; return {x:clamp(cx,0,1e9), y:clamp(cy,-VH*0.5,VH*0.5)}; }

let ball=nb(40,0), shotFrom=null;
function teeTo(i){ const cx=i===0?40:holes[i-1].cupX; ball=nb(cx,floorYAt(cx)-BR); ball.ground=true; const f=frameFor(i); cam.x=f.x; cam.y=f.y; }

function step(){
  if(state==='flight'){ const r=tickBall(ball,holes[cur].cupX);
    if(r==='sink'){ state='trans'; tt=0; ball.x=holes[cur].cupX; camS={x:cam.x,y:cam.y}; const ni=Math.min(cur+1,holes.length-1); camE=frameForNext(ni); }
    else if(r==='rest'){ state='aim'; }
    else if(r==='water'||r==='oob'){ ball=nb(shotFrom.x,shotFrom.y); ball.ground=true; state='aim'; }   // R10: reset, no soft-lock
  } else if(state==='trans'){
    // EXACT existing-game feel: 90-frame ease-in-out; cup fills 0.3→0.9; flag fades 0.3→0.7; ball rises with fill
    tt++; const t=Math.min(tt/TRANS,1); const e=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    cam.x=lerp(camS.x,camE.x,e); cam.y=lerp(camS.y,camE.y,e);
    const h=holes[cur]; const fp=clamp((t-0.3)/0.6,0,1); h.fill=fp;
    const rim=h.cupY, bottom=h.cupY+CD; ball.y=lerp(bottom,rim,fp)-BR;
    if(t>=1){ h.sunk=true; if(cur<holes.length-1){ cur++; teeTo(cur); state='aim'; } else state='done'; }
  }
}
function frameForNext(ni){ // frame of the NEXT hole, but ball will be at prev cup; reuse frameFor with ni
  return frameFor(ni); }

// ── input ──
let drag=false,ax=0,ay=0,mx=0,my=0;
cv.addEventListener('mousedown',e=>{if(state==='aim'){drag=true;ax=mx=e.clientX;ay=my=e.clientY;}});
addEventListener('mousemove',e=>{if(drag){mx=e.clientX;my=e.clientY;}});
addEventListener('mouseup',()=>{if(!drag)return;drag=false;const dx=ax-mx,dy=ay-my,p=Math.hypot(dx,dy);if(p<8)return;shotFrom={x:ball.x,y:ball.y};ball.vx=clamp(dx/180*MAXV,-MAXV,MAXV);ball.vy=clamp(dy/180*MAXV,-MAXV,MAXV);state='flight';});
addEventListener('keydown',e=>{if(e.key==='r'||e.key==='R'){buildCourse();teeTo(0);state='aim';}});

// ── render ──
function draw(){ const b=BIOMES[holes[cur]?holes[cur].biome:0]; ctx.fillStyle=b.s; ctx.fillRect(0,0,VW,VH); ctx.save(); ctx.translate(-cam.x,-cam.y);
  const x0=cam.x-20,x1=cam.x+VW+20;
  ctx.beginPath(); ctx.moveTo(x0,cam.y+VH+50); for(let sx=x0;sx<=x1;sx+=5)ctx.lineTo(sx,surfYAt(sx)); ctx.lineTo(x1,cam.y+VH+50); ctx.closePath(); ctx.fillStyle=b.g; ctx.fill();
  // water
  for(const w of waters){ if(w.x1<x0||w.x0>x1)continue; ctx.fillStyle=WATER; ctx.fillRect(w.x0,w.y,w.x1-w.x0,200); }
  // flags (current + next couple), hidden once sunk
  holes.forEach((h,i)=>{ if(h.sunk||i<cur||i>cur+2)return; const top=h.cupY-44; const op=(state==='trans'&&i===cur)?clamp(1-(Math.min(tt/TRANS,1)-0.3)/0.4,0,1):1; ctx.globalAlpha=op;
    ctx.strokeStyle='#c9d2e2'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(h.cupX,h.cupY); ctx.lineTo(h.cupX,top); ctx.stroke();
    ctx.fillStyle='#f4e04a'; ctx.beginPath(); ctx.moveTo(h.cupX,top); ctx.lineTo(h.cupX+24,top+7); ctx.lineTo(h.cupX,top+14); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#222'; ctx.font='11px monospace'; ctx.fillText(h.num,h.cupX+4,top+10); ctx.globalAlpha=1; });
  if(!(state==='trans'&&holes[cur].fill>0.6)){ ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(ball.x,ball.y,BR,0,7); ctx.fill(); }
  if(drag){const dx=ax-mx,dy=ay-my; ctx.strokeStyle='rgba(255,255,255,.55)'; ctx.setLineDash([5,5]); ctx.beginPath(); ctx.moveTo(ball.x,ball.y); ctx.lineTo(ball.x+dx*0.55,ball.y+dy*0.55); ctx.stroke(); ctx.setLineDash([]); ctx.fillStyle='rgba(255,255,255,.85)'; ctx.beginPath(); ctx.arc(ball.x+dx*0.55,ball.y+dy*0.55,3,0,7); ctx.fill();}
  ctx.restore();
  document.getElementById('hud').textContent='Hole '+Math.min(cur+1,holes.length)+' / '+holes.length+(state==='done'?'  ✓':''); }

function loop(){step();draw();requestAnimationFrame(loop);}
buildCourse(); teeTo(0); shotFrom={x:ball.x,y:ball.y}; loop();
</script></body></html>
