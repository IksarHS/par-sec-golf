<!-- ──────────────────────────────────────────────────────────────────────────────────────────────
     REAL ENGINE — the SAME script set run.html / the dist loads (full physics + render + generators +
     the roguelike run layer + the deep-space planet→planet TRAVEL transition). The ONE difference: we
     DO NOT load src/roguelike/login-ui.js, and we set ?nologin semantics — so there is NO firebase /
     username gate and NO login overlay; the agent boots straight into the loop.
     (Engine files are loaded UNCHANGED — no shared file is edited. The 2-body loop is installed at the
     bottom of this page via the existing SOLAR_ITINERARY global + an RG.startRun/_buildCourse wrap, the
     exact peel-off pattern src/roguelike/portrait.js already uses.)
─────────────────────────────────────────────────────────────────────────────────────────────────── -->
<script>
  // Boot straight into play: no login overlay, no firebase gate. login-ui.js reads ?nologin to skip the
  // overlay — and we don't even load it — but set the flag so any other peek is consistent. aiEnabled stays
  // false (a human plays). RG_MINIMAL = the lean core loop (no secrets/Codex clutter), like run.html default.
  if (!/[?&]nologin\b/.test(location.search)) {
    try { history.replaceState(null, '', location.pathname + (location.search ? location.search + '&' : '?') + 'nologin'); } catch (e) {}
  }
  window.RG_MINIMAL = true;

  // ── PUSH-TO-TALK key capture, REGISTERED EARLY (before the engine scripts load) ──
  // CRITICAL: src/roguelike/run.js installs a capture-phase keydown listener that calls
  // stopImmediatePropagation() on the T key (it swallows T to keep an old terrain-texture toggle dead).
  // Capture listeners on the same target fire in REGISTRATION order, so to ever see T we must register
  // BEFORE run.js does. This block runs before <script src=…run.js> below, so our listener is first and
  // fires before run.js swallows the event. We DON'T stop propagation, so run.js still does its swallow.
  // The actual logic lives in window.__ballPTTdown/up, defined later in the main agent script.
  window.addEventListener('keydown', function (e) {
    if (e.key === 't' || e.key === 'T' || e.code === 'KeyT') { if (window.__ballPTTdown) window.__ballPTTdown(e); }
  }, true);
  window.addEventListener('keyup', function (e) {
    if (e.key === 't' || e.key === 'T' || e.code === 'KeyT') { if (window.__ballPTTup) window.__ballPTTup(e); }
  }, true);
</script>

<script>
/* ───────────────────────────────────────────────────────────────────────────────────────────────
   PAR SEC — BALL AGENT  (talking golf ball, AGENT, on the REAL ENGINE + the real 2-planet loop)

   The game is the REAL Par Sec: the real generated holes, the real ball/flag, the real hole-to-hole
   transitions, and the real deep-space planet→planet TRAVEL transition. We boot straight into a
   2-PLANET × 3-HOLE LOOP (Earth → Kepler-90b · Verdshoal → travel back → Earth → …, forever).

   The ONLY always-visible agent UI is a small "🎤 TALK" button. ALL the LLM machinery (model picker,
   LOAD, WebGPU status) lives in a DEBUG MENU toggled by the backtick (`) key — hidden by default.

   You CONVERSE with your ball. It inherently KNOWS its abilities. Ask in ANY natural wording
   ("hey can you put yourself in the hole?", "pop yourself into the cup", "get in there", "drop in")
   and it works out the intent and DOES it on the real ball — replying with ONLY a short, natural,
   in-character spoken line. No on-screen instructions, no meta-text.

   Pipeline:  mic/STT (or text) → LLM tool-call (JSON {action, say}) → validate → run on the REAL ball.
              The `say` is the ONLY thing shown to the player. Fallbacks: (1) broad keyword-intent
              matcher; (2) no WebGPU → keyword matcher + a natural rule line.

   The FACE is overlaid on the REAL engine ball each frame (follows it across holes AND planets).

   Headless API (no mic/model needed):
     window.__step(n) / __reset() / __setAuto(b)
     window.__say(text)   – route text through LLM/keyword pipeline → performs the action
     window.__do(name)    – directly run an action on the real ball
     window.__lastAction  – name of the last action performed
     window.__debug(bool) – force the debug menu open/closed (for screenshots)
     window.__nextHole()  – sink the current hole → drives the REAL hole-to-hole transition
     window.__travel()    – finish the planet (advances to its last hole + sinks) → REAL planet travel
     window.__state()     – { course, hole, holeCount, state, ball, cup, lastAction, … }
   ─────────────────────────────────────────────────────────────────────────────────────────────── */
'use strict';

// ──────────────────────────────────────────────────────────────────────────────────────────────
//  PART 0 — THE 2-PLANET × 3-HOLE LOOP  (real engine itinerary override; peel-off, no engine edit)
// ──────────────────────────────────────────────────────────────────────────────────────────────
// The real travel-advance (off-limits wrap.js) computes the next body as SOLAR_ITINERARY[indexOf(course)+1]
// and only advances while indexOf(course) < length-1. We install a 3-slot array that WRAPS — exactly the
// shipped ?loop2 pattern (planet-gen.js) and portrait.js's 3-body on-ramp:
//   ['earth','kepler90b','earth']
//     · on 'earth'    → indexOf finds the FIRST (0) → next = [1] = 'kepler90b'   (earth → kepler90b)
//     · on 'kepler90b'→ indexOf = 1, 1 < 2 → next = [2] = 'earth'               (kepler90b → BACK to earth)
//     · arriving on the 3rd 'earth', indexOf re-finds 0 → next is 'kepler90b' again. Endless ping-pong.
// holeCount is retuned to 3 per body by wrapping RG._buildCourse (the same hook portrait.js wraps).
const LOOP_BODIES = ['earth', 'kepler90b'];          // 2 colourful bodies: home green + jade sea
const LOOP_ITIN   = [LOOP_BODIES[0], LOOP_BODIES[1], LOOP_BODIES[0]];   // wrap: …→b1→b2→b1→…
const LOOP_HOLES  = 3;

(function installLoop() {
  // Retune any built course to 3 holes (mutating the returned clone is safe — it's what startRun installs).
  function retune(c) { if (c) { c.holeCount = LOOP_HOLES; } return c; }
  function applyItin() {
    var courses = (typeof WORLDS !== 'undefined' && WORLDS['run-world'] && WORLDS['run-world'].courses) || {};
    var have = LOOP_ITIN.filter(function (id, i) { return courses[id] || i === 2; });  // earth is always present
    // only install once both bodies are registered; never degrade to a 1-slot array
    if (!courses[LOOP_BODIES[0]] || !courses[LOOP_BODIES[1]]) return false;
    window.SOLAR_ITINERARY = LOOP_ITIN.slice();
    return true;
  }
  function wrapBuild() {
    if (!window.RG || !RG._buildCourse || RG._loopBuildWrapped) return false;
    RG._loopBuildWrapped = true;
    var base = RG._buildCourse.bind(RG);
    RG._buildCourse = function (id) { return retune(base(id)); };
    return true;
  }
  function wrapStart() {
    if (!window.RG || !RG.startRun || RG._loopStartWrapped) return false;
    RG._loopStartWrapped = true;
    var base = RG.startRun.bind(RG);
    RG.startRun = function (opts) { applyItin(); var r = base(opts || {}); applyItin(); return r; };
    return true;
  }
  // Persistent watcher: planet-gen reassigns SOLAR_ITINERARY at several boot points, so keep re-asserting
  // until the wraps are in AND the 2-body itinerary is stably installed (cheap no-op once stable).
  // ALSO: the engine's initFirebase boots a run BEFORE these wraps install (so it lands at holeCount 9 on
  // the un-retuned earth). Once the wraps + itinerary are ready, restart that run ONCE through the wrapped
  // startRun so the 3-hole retune + 2-body loop take effect (the exact re-boot portrait.js does).
  (function watch(n) {
    wrapBuild(); wrapStart(); applyItin();
    var ready = window.RG && RG._loopBuildWrapped && RG._loopStartWrapped
      && window.SOLAR_ITINERARY && window.SOLAR_ITINERARY.length === 3
      && (typeof WORLDS !== 'undefined' && WORLDS['run-world'] && WORLDS['run-world'].courses[LOOP_BODIES[1]]);
    if (ready && window.RG.active && !window.RG._loopBooted) {
      window.RG._loopBooted = true;
      try { RG.startRun({ course: LOOP_BODIES[0], seed: (RG.rollSeed ? RG.rollSeed() : 42) }); } catch (e) {}
    }
    if (n < 400) setTimeout(function () { watch(n + 1); }, 50);
  })(0);
})();

// ──────────────────────────────────────────────────────────────────────────────────────────────
//  PART 1 — THE BALL'S FACE — overlaid on the REAL engine ball each frame (follows it everywhere)
// ──────────────────────────────────────────────────────────────────────────────────────────────

let face = { bob: 0, sx: 1, sy: 1, blinkT: 40, blinkDur: 0, mouthT: 0 };
let mood = 'happy';          // happy | proud | sad | think
let speaking = false;
let curLine = '';
let bubble = { text: '', t: 0, full: 0, timer: 0, speakFrames: 1, alpha: 1, hold: 0 };
// After a line finishes, the bubble lingers (BUBBLE_HOLD frames) then fades out (BUBBLE_FADE frames) and
// clears — so it drifts away naturally when you stop talking to the ball, instead of hanging forever. ~60fps.
const BUBBLE_HOLD = 180, BUBBLE_FADE = 42;
let thinking = false;
let _faceFrame = 0;          // our own frame counter for face/blink/sparkle timing

// The face is drawn CENTERED ON the real ball, in GAME UNITS. IMPORTANT: the engine's draw() already does
// ctx.scale(displayScale) and we draw from MODE.drawHUD which runs INSIDE that scale — so we work in game
// units (ball.x - camera.x), NOT screen pixels. (An earlier ×displayScale double-applied the scale and made
// the face drift down-right of the ball.) The face is centered on ball.x/ball.y so it IS the ball's face.
function _camY() { return (typeof camera !== 'undefined' && camera.y) || 0; }
function ballScreen() {
  // face radius in GAME units: bigger than the ~4px ball so the character reads (eyes/mouth legible), but
  // centered on the ball so the white ball reads as the head, not a separate dot. ~16 game-units ≈ a head.
  const base = Math.max(BALL_RADIUS * 3.6, 16);
  const live = (agentAnim || (typeof ball !== 'undefined' && !ball.atRest)) ? 1.14 : 1;
  return {
    x: (ball.x - camera.x),
    y: (ball.y - _camY()) + (face.bob || 0),
    r: base * live * (agentAnim && agentAnim.faceScale ? agentAnim.faceScale : 1),
  };
}

function drawFaceOverlay() {
  if (typeof ball === 'undefined' || typeof ctx === 'undefined') return;
  // Hide the face while the deep-space TRAVEL sequence owns the ship (the engine draws its own travel
  // ball/sky); re-appears on the destination surface. Keeps the planet-transition reading as the real game.
  if (window.RG && RG.descending) return;
  const p = ballScreen();
  const R = p.r;
  ctx.save();
  ctx.translate(p.x, p.y);
  if (agentAnim && agentAnim.faceRot) ctx.rotate(agentAnim.faceRot);
  ctx.scale(face.sx, face.sy);
  drawFace(R);
  ctx.restore();
  drawBubble(p, R);
}

function drawFace(R) {
  // eyes
  const eyeX = R * 0.30, eyeY = -R * 0.16, eyeR = R * 0.135;
  const blink = face.blinkDur > 0 ? 1 : 0;
  const brow = (mood === 'sad') ? R * 0.05 : (mood === 'proud') ? -R * 0.03 : 0;
  for (let s = -1; s <= 1; s += 2) {
    ctx.save(); ctx.translate(s * eyeX, eyeY + brow);
    if (blink) {
      ctx.strokeStyle = '#16202c'; ctx.lineWidth = R * 0.05; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(-eyeR, 0); ctx.lineTo(eyeR, 0); ctx.stroke();
    } else {
      ctx.fillStyle = '#1b2530'; ctx.beginPath(); ctx.arc(0, 0, eyeR, 0, 6.2832); ctx.fill();
      const px = (mood === 'think') ? -s * eyeR * 0.4 : 0, py = (mood === 'sad') ? eyeR * 0.3 : -eyeR * 0.1;
      ctx.fillStyle = '#0c0e14'; ctx.beginPath(); ctx.arc(px, py, eyeR * 0.55, 0, 6.2832); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.beginPath(); ctx.arc(px - eyeR * 0.25, py - eyeR * 0.28, eyeR * 0.2, 0, 6.2832); ctx.fill();
    }

    if (mood === 'proud') { ctx.moveTo(bxL, byTop + R * 0.02); ctx.lineTo(bxR, byTop - R * 0.02); }
    else if (mood === 'sad') { ctx.moveTo(bxL, byTop - R * 0.04); ctx.lineTo(bxR, byTop + R * 0.05); }
    else if (mood === 'think' && s2 < 0) { ctx.moveTo(bxL, byTop + R * 0.04); ctx.lineTo(bxR, byTop - R * 0.05); }

  ctx.fillStyle = '#16202c'; ctx.strokeStyle = '#16202c'; ctx.lineWidth = R * 0.05; ctx.lineCap = 'round';
  if (open > R * 0.06) {

    ctx.fillStyle = '#ff7a8a'; ctx.beginPath(); ctx.ellipse(0, my + open * 0.35, mw * 0.4, open * 0.42, 0, 0, 6.2832); ctx.fill();

function wrapText(t, max) {

  // (where the flag/cup are). Pin above the ball with a guaranteed clearance so the bubble never crowds
  // the face / the tail never vanishes (a small minimum gap above the ball top). GAME units (cw = visible wide).
  const clearance = Math.max(14, R * 0.9);   // keep the bubble a few px clear of the ball top

// tick the face every rendered frame (called from the draw-hook + headless __step)
function tickFace() {
  _faceFrame++;
  const idle = (typeof ball !== 'undefined') && ball.atRest && !agentAnim;
  face.bob = idle ? Math.sin(_faceFrame * 0.045) * 3 : 0;
  const br = 1 + (idle ? Math.sin(_faceFrame * 0.045) * 0.012 : 0);
  face.sx = br; face.sy = 2 - br;
  if (face.blinkDur > 0) face.blinkDur--;
  else { face.blinkT--; if (face.blinkT <= 0) { face.blinkDur = 6; face.blinkT = 90 + ((Math.random() * 120) | 0); } }
  if (speaking) {
    face.mouthT++;
    face.sx *= 1 + 0.02 * Math.sin(face.mouthT * 0.55);
    face.sy *= 1 - 0.02 * Math.sin(face.mouthT * 0.55);
    bubble.timer--;
    if (bubble.t < bubble.full) bubble.t += Math.max(1, bubble.full / Math.max(1, bubble.speakFrames * 0.6));
    if (bubble.timer <= 0) { speaking = false; bubble.hold = BUBBLE_HOLD; bubble.alpha = 1; if (mood === 'think') mood = 'happy'; }
  } else {
    if (bubble.t < bubble.full) bubble.t = bubble.full;       // snap to fully-typed
    if (bubble.text) {                                        // linger, then fade out + clear
      if (bubble.hold > 0) bubble.hold--;
      else {
        bubble.alpha = (bubble.alpha != null ? bubble.alpha : 1) - 1 / BUBBLE_FADE;
        if (bubble.alpha <= 0) { bubble.alpha = 0; bubble.text = ''; bubble.t = 0; }
      }

}

function speakLine(text, m) {
  mood = m || 'happy';
  curLine = text;
  bubble = { text: text, t: 0, full: text.length, alpha: 1, hold: 0 };
  speaking = true; face.mouthT = 0;
  bubble.speakFrames = Math.max(48, Math.min(280, text.length * 2.0));

}
function pushBubble(text, m) { thinking = false; speakLine(text, m); speakTTS(text); }

// ──────────────────────────────────────────────────────────────────────────────────────────────
//  PART 2 — ACTIONS on the REAL engine ball/cup (suspend physics while animating, then release)
// ──────────────────────────────────────────────────────────────────────────────────────────────
// agentAnim = a per-frame scripted controller. While set, the agent owns the ball; on completion it
// RELEASES the ball back to the real engine. The agent tick runs from the engine draw hook + __step.
let agentAnim = null;
let sparkles = [];   // [{x,y,vx,vy,life}]  drawn in WORLD space over the real hole

function cupRef() { return (typeof holes !== 'undefined') ? holes[(typeof currentHole !== 'undefined') ? currentHole : 0] : null; }
function lerp(a, b, t) { return a + (b - a) * t; }
function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
function groundYAt(x) { try { return terrainYAt(x) - BALL_RADIUS; } catch (e) { return ball.y; } }

function startAnim(a) {
  ball.vx = 0; ball.vy = 0; ball.atRest = true; ball.onGround = false;
  state = STATE_AIM;
  a.t0 = _faceFrame; a.faceScale = a.faceScale || 1; a.faceRot = 0;
  agentAnim = a;
}
function stepAnim() {
  if (!agentAnim) return;
  const a = agentAnim;
  const t = Math.min(1, (_faceFrame - a.t0) / a.dur);
  a.step(t);
  if (t >= 1) {
    const done = a.done; agentAnim = null;
    if (done) done();

}
function emitSparkles(wx, wy, n) {
  for (let i = 0; i < (n || 8); i++) {
    const ang = Math.random() * 6.283, sp = 0.6 + Math.random() * 1.4;
    sparkles.push({ x: wx, y: wy, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp - 0.8, life: 28 + (Math.random() * 16 | 0) });
  }
}
function stepSparkles() {
  for (let i = sparkles.length - 1; i >= 0; i--) {
    const s = sparkles[i]; s.x += s.vx; s.y += s.vy; s.vy += 0.05; s.life--;
    if (s.life <= 0) sparkles.splice(i, 1);
  }
}
function drawSparkles() {  // WORLD space (camera transform already applied by caller)
  for (const s of sparkles) {
    ctx.globalAlpha = Math.max(0, s.life / 40);
    ctx.fillStyle = '#ffe08a';
    ctx.fillRect(s.x - 1.2, s.y - 1.2, 2.4, 2.4);
  }
  ctx.globalAlpha = 1;
}

// Drop the ball INTO the cup and HAND OFF to the engine's REAL sink → transition flow. This is what
// advances holes (1→2→3) and, on the last hole of a body, fires the REAL planet→planet TRAVEL sequence
// (wrap.onTransitionEnd → RG._beginTravel via SOLAR_ITINERARY). One code path = the real game.
function realSink() {
  const h = cupRef(); if (!h) return;
  ball.x = h.cupX;
  ball.y = h.cupBottomY - BALL_RADIUS;
  ball.vx = 0; ball.vy = 0; ball.atRest = true; ball.onGround = true;
  agentAnim = null;
  // Enter the engine's in-cup → pause → transition flow exactly like a real sunk putt.
  if (typeof STATE_PAUSE !== 'undefined') { state = STATE_PAUSE; transitionTimer = 0; }
}

// ── ACTION TABLE ──────────────────────────────────────────────────────────────────────────────
const ACTION_INFO = [
  ['sink_in_hole', '★ lift up, glide over the cup, drop in (advances the hole / travels planets)'],
  ['to_tee',       'return to the tee'],
  ['hop',          'a single upward hop (real gravity)'],
  ['spin',         'barrel-roll in place'],
  ['putt_to_hole', 'roll toward the cup with real physics'],
  ['bounce',       'a few bouncy hops'],
  ['celebrate',    'happy wiggle + sparkles'],
  ['come_here',    'float toward screen-center'],
  ['hide',         'fade out, pop back at the tee'],
  ['say_distance', 'speak distance to the cup'],
  ['none',         'plain chat'],
];
const ACTION_NAMES = ACTION_INFO.map(a => a[0]);

const ACTIONS = {
  // ★ SIGNATURE: lift the real ball WAY up, glide it over the cup in a clear arc, drop it in.
  sink_in_hole(say) {
    const h = cupRef(); if (!h) { ACTIONS.none(say); return; }
    const sx = ball.x, sy = ball.y;
    const apexY = Math.min(sy, h.cupY) - 150;
    let _liftPopped = false, _dropEmitted = false;
    startAnim({
      dur: 108,
      step(t) {
        if (t < 0.40) {
          const u = easeOut(t / 0.40);
          ball.x = sx;
          ball.y = lerp(sy, apexY, u);
          this.faceScale = lerp(1, 1.15, u);
          if (!_liftPopped && u > 0.25) { _liftPopped = true; emitSparkles(sx, sy - 6, 7); }
        } else if (t < 0.72) {
          const u = easeInOut((t - 0.40) / 0.32);
          ball.x = lerp(sx, h.cupX, u);
          ball.y = apexY - Math.sin(u * Math.PI) * 22;
          this.faceScale = 1.15;
        } else {
          const u = easeOut((t - 0.72) / 0.28);
          ball.x = h.cupX;
          ball.y = lerp(apexY, h.cupBottomY - BALL_RADIUS, u);
          this.faceScale = lerp(1.15, 0.7, u);
          if (u > 0.6 && !_dropEmitted) { _dropEmitted = true; emitSparkles(h.cupX, h.cupY, 8); }
        }
        ball.atRest = true; ball.vx = 0; ball.vy = 0;
      },
      done() { realSink(); },
    });
    pushBubble(say || 'Yeah, yeah. In it goes.', 'proud');
  },

  to_tee(say) {
    const h = cupRef(); if (!h) { ACTIONS.none(say); return; }
    const tx = h.teeX, ty = groundYAt(h.teeX);
    const sx = ball.x, sy = ball.y;
    startAnim({
      dur: 54,
      step(t) {
        const u = easeInOut(t);
        ball.x = lerp(sx, tx, u);
        ball.y = lerp(sy, ty, u) - Math.sin(u * Math.PI) * 48;
        ball.atRest = true; ball.vx = 0; ball.vy = 0;
      },
      done() {
        ball.x = tx; ball.y = ty; ball.vx = 0; ball.vy = 0; ball.atRest = true; ball.onGround = true;
        if (typeof state !== 'undefined') state = STATE_AIM;
      },
    });
    pushBubble(say || 'Back to the tee, then.', 'happy');
  },

  hop(say) {
    agentAnim = null;
    ball.atRest = false; ball.onGround = false;
    ball.vx = 0; ball.vy = -7; ball.flightFrames = 0; ball.slowFrames = 0;
    if (typeof state !== 'undefined') state = STATE_FLIGHT;
    pushBubble(say || 'A little hop. There you go.', 'happy');
  },

  spin(say) {
    startAnim({
      dur: 42, faceScale: 1,
      step(t) {
        this.faceRot = t * Math.PI * 2;
        ball.atRest = true; ball.vx = 0; ball.vy = 0;
        ball.rotation = (ball.rotation || 0) + 0.5;
      },
      done() {},
    });
    pushBubble(say || 'Round and round we go.', 'happy');
  },

  putt_to_hole(say) {
    agentAnim = null;
    const h = cupRef(); if (!h) { ACTIONS.none(say); return; }
    const dx = h.cupX - ball.x;
    const dir = dx >= 0 ? 1 : -1;
    const dist = Math.abs(dx);
    const cap = (typeof MAX_POWER !== 'undefined') ? MAX_POWER : 18;
    ball.vx = dir * Math.min(cap, Math.max(2.4, dist * 0.013));
    ball.vy = -0.4;
    ball.atRest = false; ball.onGround = false; ball.flightFrames = 0; ball.slowFrames = 0; ball.spinRate = 0;
    if (typeof state !== 'undefined') state = STATE_FLIGHT;
    pushBubble(say || 'Rolling it up. Don\'t get excited.', 'think');
  },

  bounce(say) {
    agentAnim = null;
    ball.atRest = false; ball.onGround = false;
    ball.vx = 0.6; ball.vy = -5.4; ball.flightFrames = 0; ball.slowFrames = 0;
    if (typeof state !== 'undefined') state = STATE_FLIGHT;
    pushBubble(say || 'Bounce, bounce. Sure.', 'happy');
  },

  celebrate(say) {
    const sx = ball.x, sy = ball.y;
    startAnim({
      dur: 60,
      step(t) {
        ball.x = sx + Math.sin(t * Math.PI * 6) * 8;
        ball.y = sy - Math.abs(Math.sin(t * Math.PI * 4)) * 10;
        ball.atRest = true; ball.vx = 0; ball.vy = 0;
        if ((_faceFrame % 8) === 0) emitSparkles(sx, sy - 12, 3);

      done() {},

  },

  come_here(say) {
    const sc = (typeof displayScale === 'number' && displayScale) ? displayScale : 1;
    const targetWX = camera.x + (canvas.width / sc) / 2;
    const targetWY = _camY() + (canvas.height / sc) / 2;

  },

  hide(say) {
    const h = cupRef(); if (!h) { ACTIONS.none(say); return; }

function runAction(name, say) {

const SYSTEM_PROMPT =

  "You run FULLY LOCAL on the player's device. You have these abilities you can do to " +
  "yourself (the real ball) in the game:\n" +
  "- sink_in_hole: put yourself in the hole / cup (lift up, float over, drop in)\n" +
  "- to_tee: go back to the tee / start of the hole\n" +
  "- hop: a little jump\n" +
  "- spin: spin / twirl / roll over in place\n" +
  "- putt_to_hole: roll yourself toward the hole with real physics\n" +
  "- bounce: a few bouncy hops\n" +
  "- celebrate: a happy little celebration\n" +
  "- come_here: float over toward the middle of the screen\n" +
  "- hide: disappear and pop back at the tee\n" +
  "- say_distance: tell them how far the hole is\n" +
  "- none: just chatting, no action\n\n" +
  "When the player asks you to do something in ANY natural wording, work out which ability they mean " +
  "and DO it. Reply with ONLY a JSON object: {\"action\":\"<one ability name or none>\",\"say\":\"<your line>\"}. " +
  "The `say` is a short spoken line — one or two short sentences, about 20 words max. Dry and in-character; " +
  "a quick easygoing line, not a paragraph. NEVER explain how, NEVER give the player instructions, NEVER " +
  "name the action or output meta-text — just do it and say something laid-back (e.g. \"Yeah, yeah. In it " +
  "goes.\" or \"Rolling it up. Don't get excited.\"). If they're only chatting, chat back with action \"none\" " +
  "— still a short, unbothered line. Never use markdown, lists, or emoji. Output ONLY the JSON object.";

// BROAD keyword-intent matcher (fallback #1 and the no-WebGPU floor). Maps natural phrasings → an action
// + a natural, casual line. Heavily synonym'd so "pop yourself into the cup", "get in there", "drop in",
// "go in the hole for me" all map to sink_in_hole. This is what the headless verify exercises.
function keywordAction(textRaw) {
  const t = (' ' + (textRaw || '').toLowerCase() + ' ').replace(/[^a-z0-9 ]+/g, ' ').replace(/\s+/g, ' ');
  const has = (...ws) => ws.some(w => t.indexOf(w) >= 0);

  // ── ★ SINK / GO IN THE HOLE — broadest, checked FIRST ──
  if (has(
        'in the hole', 'in the cup', 'in there', 'into the hole', 'into the cup',
        'in to the hole', 'in to the cup', 'down the hole', 'down the cup',
        'sink', 'hole it', 'hole in one', 'holeinone', 'cup it',
        'drop in', 'drop yourself', 'drop down', 'pop in', 'pop yourself', 'pop into', 'pop it in',
        'put yourself in', 'put it in', 'get in', 'go in', 'jump in', 'dive in', 'fall in', 'hop in', 'slide in',
        'gimme', 'gimmie', 'just win', 'win it', 'win this', 'finish it', 'finish the hole', 'sink it', 'make it',
        'get in there', 'go in there', 'down you go', 'in you go'))
    return { action: 'sink_in_hole', say: 'Yeah, yeah. In it goes.' };

  // ── back to the tee ──
  if (has('to the tee', 'the tee', 'back to start', 'go back', 'start over', 'start again', 'restart',
          'reset', 'beginning', 'from the start', 'do over', 'redo', 'take it back', 'rewind'))
    return { action: 'to_tee', say: 'Back to the tee, then.' };

  // ── putt / roll toward the cup ──
  if (has('putt', 'roll it', 'roll to', 'roll toward', 'roll towards', 'roll up', 'nudge', 'tap it',
          'roll yourself', 'creep toward', 'inch toward', 'head for the hole', 'go for the hole'))
    return { action: 'putt_to_hole', say: 'Rolling it up. Don\'t get excited.' };

  // ── hop / jump ──
  if (has('hop', 'jump', 'leap', 'spring up', 'bounce up', 'little jump', 'hup'))
    return { action: 'hop', say: 'A little hop. There you go.' };

  // ── spin / twirl ──

// Keep the spoken line SHORT so it never rambles or visibly cuts off: take the first sentence, and if
// it's still long, trim to ~90 chars at a WORD boundary (never mid-word). Personality stays, length doesn't.
function clampSay(raw) {
  let s = String(raw).replace(/\s+/g, ' ').trim();
  const re = /[.!?](\s|$)/g; let m; const ends = [];          // keep up to the first TWO sentences
  while ((m = re.exec(s)) && ends.length < 2) ends.push(m.index + 1);
  if (ends.length) s = s.slice(0, ends[ends.length - 1]);
  if (s.length > 150) {                                       // safety net: cut at the last space before 150, add …
    const cut = s.slice(0, 150); const sp = cut.lastIndexOf(' ');
    s = (sp > 60 ? cut.slice(0, sp) : cut).replace(/[,;:\s]+$/, '') + '…';
  }
  return s;
}

// Ask the LLM for a tool call (strict JSON). Returns {action, say} or null on failure → caller falls back.
async function llmDecide(userText) {
  convo.push({ role: 'user', content: userText });
  if (convo.length > 10) convo = convo.slice(-10);
  const msgs = [{ role: 'system', content: SYSTEM_PROMPT }].concat(convo);
  // Plain completion only — NO response_format/json_object: this MLC build's grammar compiler
  // (GrammarCompiler.CompileJSONSchema) chokes on structured-output mode. The system prompt already
  // asks for strict {action,say} JSON and we parse it out of the plain text reply below.
  const out = await engine.chat.completions.create({
    messages: msgs, temperature: 0.7, max_tokens: 96,   // ceiling: keep replies to ~1-2 short sentences
  });
  const txt = (out.choices && out.choices[0] && out.choices[0].message.content || '').trim();
  console.log('[ball-agent] raw LLM output:', JSON.stringify(txt));
  let parsed = null;
  try { parsed = JSON.parse(txt); }
  catch (e) { const m = txt.match(/\{[\s\S]*\}/); if (m) { try { parsed = JSON.parse(m[0]); } catch (e2) {} } }
  if (!parsed || typeof parsed !== 'object') return null;
  let action = String(parsed.action || 'none').trim();
  if (ACTION_NAMES.indexOf(action) < 0) action = 'none';
  const say = (parsed.say != null) ? clampSay(parsed.say) : null;
  convo.push({ role: 'assistant', content: JSON.stringify({ action, say }) });
  return { action, say };
}

// ── route(): user text → decision (LLM or keyword) → run the action on the real ball → TTS ──
let routing = false;
async function route(userText) {
  if (!userText) return;
  if (routing) return;
  routing = true;
  thinking = true; mood = 'think';
  let decision = null, src;
  if (brainMode === 'llm' && llmReady && !llmBusy) {
    llmBusy = true;
    try {
      decision = await llmDecide(userText);
      if (decision) src = 'LLM · ' + SELECTED_MODEL.id.replace(/-q4f16_1-MLC/, '');
    } catch (e) { console.warn('[ball-agent] LLM decide FAILED → keyword:', e); src = 'keyword (LLM error: ' + (e && e.message || e) + ')'; }
    llmBusy = false;
  }
  // LLM action=none on an obvious command → re-check the broad keyword matcher (so a weak local model
  // can't swallow a clear "put yourself in the hole" as chatter). Keeps the LLM's `say` if it had one.
  if (!decision || decision.action === 'none') {
    const kw = keywordAction(userText);
    if (kw.action !== 'none') {
      decision = { action: kw.action, say: (decision && decision.say) || kw.say };
      src = (src ? src + ' + ' : '') + 'keyword';
    } else if (!decision) {
      decision = kw;
      src = src || ((brainMode === 'llm' && llmReady) ? 'keyword (LLM empty/invalid)' : 'keyword — LLM not loaded (brainMode=' + brainMode + ')');
    }
  }
  window.__lastBrain = src;
  console.log('[ball-agent] decided via', src, '→', JSON.stringify(decision));
  thinking = false;
  runAction(decision.action, decision.say);
  routing = false;
  return decision;
}

// ──────────────────────────────────────────────────────────────────────────────────────────────
//  PART 5 — OVERLAY HOOK into the REAL engine draw loop + agent tick
// ──────────────────────────────────────────────────────────────────────────────────────────────
// The engine runs its OWN gameLoop (main.js): update() + draw(). We DON'T own the loop. We:
//   1. tick the agent (scripted action + sparkles + face) once per engine update, via an update() wrap
//   2. draw our world-space sparkles + the screen-space FACE after the engine's draw, via a MODE.drawHUD
//      wrap (drawHUD runs last, inside the displayScale ctx — screen space, which is where the face lives).
// This makes the face follow the REAL ball across holes and planets for free (it reads ball/camera live).

let _agentTicked = 0;
function agentTick() {
  if (agentAnim) stepAnim();   // a scripted action owns the ball this frame (engine update is skipped below)
  stepSparkles();
  tickFace();
  _agentTicked++;
}

// Wrap update(): when a scripted anim owns the ball, run OUR step instead of the engine physics for that
// frame (so the agent fully drives ball.x/y); otherwise let the engine update, then tick face/sparkles.
(function wrapUpdate() {

  const baseUpdate = window.update;
  window.update = function () {

    baseUpdate.apply(this, arguments);
    agentTick();

})();
