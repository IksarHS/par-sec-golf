<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Golf Orbit — mega-drive prototype</title>
  <style>html,body{margin:0;background:#0c0e14;overflow:hidden}</style>
</head>
<body>
<canvas id="c" width="960" height="540"></canvas>
<script>
// ── GOLF ORBIT — MEGA-DRIVE prototype (our art style) ─────────────────────────
// Line up a POWER BAR, then SLAM the ball so hard it screams over the curve of the planet, covering
// thousands of yards before air-drag + gravity bring it down to bounce and settle. No hole on screen —
// just "yards to the pin". CAMERA: anchors the terrain and ZOOMS OUT as far as needed to keep BOTH the
// launch terrain and the ball in frame — so the still earth contrasts the fast-moving ball.  Deep-space
// sky, our flat planet, white dimpled ball.
var cv = document.getElementById('c'), ctx = cv.getContext('2d'), W = 960, H = 540;

// ── tunables ──
var TARGET = 12000;          // yards to the pin (no hole drawn — just the readout)
var GRAV = 1500, DRAG = 0.16, REST = 0.50, ROLLF = 0.82;
var LAUNCH_DEG = 26, VBASE = 1900, VPOW = 2700;
var GY = H * 0.80;           // screen Y of the planet surface at screen-centre
var GCURVE = 0.00034;        // earth curvature (screen-space)

var ball, state, pm, pmDir, sweetLo, sweetHi, view, trail, hills, coins, doneT, lastPerfect, frame;

function reset() {
  ball = { x: 0, y: 0, vx: 0, vy: 0, moving: false, bounces: 0 };
  state = 'aim'; pm = 0; pmDir = 1; sweetLo = 0.74; sweetHi = 0.88;
  view = { zoom: 0.27, ox: 0 }; trail = []; doneT = 0; lastPerfect = false; frame = 0;
  hills = []; for (var i = 0; i < 90; i++) hills.push({ x: i * 240 + (i * 137 % 110), w: 60 + (i * 53 % 80), h: 12 + (i * 31 % 22), t: (i % 3 === 0) });
  coins = []; for (var i = 1; i < 30; i++) coins.push({ x: i * 300, y: 700 + Math.sin(i * 0.7) * 520 });
  updateView(); draw();
}

function shoot(power) {
  var perfect = power >= sweetLo && power <= sweetHi; lastPerfect = perfect;
  var p = perfect ? 1.06 : power, sp = VBASE + p * VPOW, a = LAUNCH_DEG * Math.PI / 180;
  ball.vx = sp * Math.cos(a); ball.vy = sp * Math.sin(a); ball.moving = true; state = 'fly'; trail = [];
}
window.__shoot = function (angleDeg, power01) { if (typeof power01 === 'number') shoot(Math.max(0, Math.min(1, power01))); };

// camera: fit [tee .. ball] horizontally and [ground .. ball height] vertically; ground anchored, zoom OUT to keep both.
function updateView() {
  var BALLSX = W * 0.40;
  // HEIGHT-DRIVEN zoom: high in the sky -> zoom OUT (see the arc + the curve of the planet),
  // descending toward the earth -> smoothly zoom back IN to the landing. Ground stays anchored at the
  // bottom (the still earth); terrain features scroll past to show the ball's speed.
  var target = (state === 'aim') ? 0.92 : Math.max(0.14, Math.min(0.92, (GY - 46) / (ball.y + 430)));
  view.zoom += (target - view.zoom) * 0.09;          // smooth, both on the way out AND back in
  view.ox = BALLSX - ball.x * view.zoom;             // follow the ball horizontally
}
function groundScreenY(sx) { var dx = sx - W / 2; return GY + GCURVE * dx * dx; }
function wToS(wx, wy) { var sx = view.ox + wx * view.zoom; return { x: sx, y: groundScreenY(sx) - wy * view.zoom }; }

function step() {
  frame++; var dt = 1 / 60;
  if (state === 'aim') {
    pm += pmDir * 0.022; if (pm > 1) { pm = 1; pmDir = -1; } if (pm < 0) { pm = 0; pmDir = 1; }
    if (frame === 52) { pm = 0.80; shoot(0.80); }                 // auto-demo: lock a perfect drive
  } else if (state === 'fly') {
    ball.vy -= GRAV * dt; var d = Math.exp(-DRAG * dt); ball.vx *= d; ball.vy *= d;
    ball.x += ball.vx * dt; ball.y += ball.vy * dt;
    if (ball.y <= 0) {
      ball.y = 0;
      if (Math.abs(ball.vy) > 140) { ball.vy = -ball.vy * REST; ball.vx *= ROLLF; ball.bounces++; }
      else { ball.vy = 0; ball.vx *= 0.90; if (ball.vx < 26) { ball.moving = false; state = 'done'; doneT = 0; } }
    }
    trail.push({ x: ball.x, y: ball.y }); if (trail.length > 70) trail.shift();
  } else if (state === 'done') { if (++doneT > 110) reset(); }
  updateView(); draw();
}

function draw() {
  var z = view.zoom;
  // deep-space sky (our palette)
  var g = ctx.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#08090f'); g.addColorStop(0.65, '#0f1622'); g.addColorStop(1, '#172534');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  for (var i = 0; i < 72; i++) { var sx = (i * 197) % W, sy = (i * 119) % H, b = (i % 7 === 0) ? 2 : 1; ctx.fillStyle = (i % 5 === 0) ? 'rgba(190,210,255,0.85)' : 'rgba(255,255,255,0.45)'; ctx.fillRect(sx, sy, b, b); }
  // atmosphere glow hugging the limb
  var atmo = ctx.createLinearGradient(0, GY - 120, 0, GY); atmo.addColorStop(0, 'rgba(80,150,215,0)'); atmo.addColorStop(1, 'rgba(116,196,236,0.42)');
  ctx.fillStyle = atmo; ctx.beginPath(); ctx.moveTo(0, groundScreenY(0)); for (var sx = 0; sx <= W; sx += 6) ctx.lineTo(sx, groundScreenY(sx)); for (var sx = W; sx >= 0; sx -= 6) ctx.lineTo(sx, groundScreenY(sx) - 120); ctx.closePath(); ctx.fill();
  // curved planet (our flat earth-green)
  function gpath(off) { ctx.beginPath(); ctx.moveTo(0, groundScreenY(0) + off); for (var sx = 0; sx <= W; sx += 6) ctx.lineTo(sx, groundScreenY(sx) + off); ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); }
  ctx.fillStyle = '#3f8f3a'; gpath(0); ctx.fill();
  ctx.fillStyle = '#2f7330'; gpath(6); ctx.fill();
  ctx.strokeStyle = '#5cb653'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0, groundScreenY(0)); for (var sx = 0; sx <= W; sx += 6) ctx.lineTo(sx, groundScreenY(sx)); ctx.stroke();
  // terrain features — the STILL earth the ball races over (world-anchored; shrink as we zoom out)
  for (var i = 0; i < hills.length; i++) {
    var hl = hills[i], s = wToS(hl.x, 0); if (s.x < -100 || s.x > W + 100) continue;
    if (hl.t) { var th = (26 + hl.h) * z; if (th < 2) continue; ctx.fillStyle = '#2f7d34'; ctx.beginPath(); ctx.moveTo(s.x - 7 * z - 1, s.y); ctx.lineTo(s.x, s.y - th); ctx.lineTo(s.x + 7 * z + 1, s.y); ctx.closePath(); ctx.fill(); }
    else { ctx.fillStyle = '#4ea23f'; ctx.beginPath(); ctx.ellipse(s.x, s.y, Math.max(2, hl.w * z), Math.max(1.5, hl.h * z), 0, Math.PI, 0); ctx.fill(); }
  }
  // coins along the arc
  for (var i = 0; i < coins.length; i++) { var s = wToS(coins[i].x, coins[i].y); if (s.x < -10 || s.x > W + 10) continue; var cr = Math.max(2, 34 * z); ctx.fillStyle = '#ffd23c'; ctx.beginPath(); ctx.arc(s.x, s.y, cr, 0, 6.2832); ctx.fill(); }
  // trail
  if (trail.length > 1) { ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2.5; ctx.beginPath(); for (var i = 0; i < trail.length; i++) { var s = wToS(trail[i].x, trail[i].y); if (i === 0) ctx.moveTo(s.x, s.y); else ctx.lineTo(s.x, s.y); } ctx.stroke(); }
  // ball (min size so it stays a visible fast dot when zoomed way out)
  var bs = wToS(ball.x, ball.y), r = Math.max(3.5, Math.min(10, 28 * z));
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(bs.x, bs.y, r, 0, 6.2832); ctx.fill();
  if (r > 5) { ctx.fillStyle = 'rgba(0,0,0,0.22)'; for (var a = 0; a < 3; a++) { ctx.beginPath(); ctx.arc(bs.x + Math.cos(a * 2.094) * r * 0.42, bs.y + Math.sin(a * 2.094) * r * 0.42, r * 0.22, 0, 6.2832); ctx.fill(); } }

  // ── HUD ──
  ctx.textAlign = 'left'; ctx.fillStyle = '#fff'; ctx.font = 'bold 13px monospace'; ctx.fillText('GOLF ORBIT', 22, 26);
  if (state === 'aim') {
    ctx.fillStyle = 'rgba(255,255,255,0.75)'; ctx.font = '12px monospace'; ctx.fillText('PIN ' + TARGET + ' YDS away  ·  stop the bar in the green for a PERFECT drive', 22, 44);
    var bw = 460, bx = (W - bw) / 2, by = H - 44, bh = 22;
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(bx - 3, by - 3, bw + 6, bh + 6);
    ctx.fillStyle = '#1d2a24'; ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = '#2e8b3a'; ctx.fillRect(bx + sweetLo * bw, by, (sweetHi - sweetLo) * bw, bh);
    var grd = ctx.createLinearGradient(bx, 0, bx + bw, 0); grd.addColorStop(0, '#3fd0e0'); grd.addColorStop(0.7, '#ffe14a'); grd.addColorStop(1, '#ff5a3c');
    ctx.fillStyle = grd; ctx.fillRect(bx, by, pm * bw, bh);
    ctx.fillStyle = '#fff'; ctx.fillRect(bx + pm * bw - 2, by - 5, 4, bh + 10);
    ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.font = '11px monospace'; ctx.fillText('POWER', W / 2, by - 8); ctx.textAlign = 'left';
  } else {
    var yds = Math.round(ball.x);
    ctx.textAlign = 'center'; ctx.fillStyle = '#fff'; ctx.font = 'bold 40px monospace'; ctx.fillText(yds.toLocaleString() + ' yds', W / 2, 54);
    ctx.font = '13px monospace'; ctx.fillStyle = 'rgba(255,255,255,0.82)';
    if (state === 'fly') ctx.fillText((lastPerfect ? 'PERFECT!  ' : '') + Math.max(0, TARGET - yds).toLocaleString() + ' yds to pin  ·  ' + ball.bounces + ' bounce' + (ball.bounces === 1 ? '' : 's'), W / 2, 78);
    else { var diff = yds - TARGET; ctx.fillText((diff >= 0 ? '+' + diff + ' past the pin' : Math.abs(diff) + ' yds short') + '  ·  ' + ball.bounces + ' bounces', W / 2, 78); }
    ctx.textAlign = 'left';
  }
}

window.__reset = reset; window.__step = step; window.__frame = function () { return frame; };
var auto = true; window.__setAuto = function (a) { auto = a; };
(function loop() { if (auto) step(); requestAnimationFrame(loop); })();
cv.addEventListener('click', function () { if (state === 'aim') shoot(pm); });
reset();
</script>
</body>
</html>
