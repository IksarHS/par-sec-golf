<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="data:,">
  <meta charset="utf-8">
  <title>Hole Mockup Board — dream holes in our art</title>
  <link rel="preload" href="../assets/fonts/DepartureMono-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    @font-face{font-family:'Departure Mono';
      src:url('../assets/fonts/DepartureMono-Regular.woff2') format('woff2'),
          url('../assets/fonts/DepartureMono-Regular.woff') format('woff');
      font-weight:normal;font-style:normal;font-display:swap;}
    html,body{margin:0;background:#0c0e14;overflow:hidden}canvas{display:block}
  </style>
</head>
<body>
<canvas id="c" width="800" height="500"></canvas>
<script>
// ── Hole Mockup Board ─────────────────────────────────────────────────────────
// A PURE-VISUAL renderer: give it a hole SPEC and it draws a flat-faceted side-view
// mockup in our Par Sec art (deep-space sky + stars, flat terrain w/ lip, caves/
// overhangs, water/lava, white dimpled ball at tee, carved cup + gold flag, label).
// No physics, no feasibility — it draws the DREAM so we can react to silhouettes.
//
// SPEC FORMAT (coords: x 0..1000 L→R, y 0..600 with 0=top sky / 600=bottom; +y down):
//   { name, category, palette,                  // palette = key in PAL below
//     terrain:[[x,y],...],                       // surface polyline L→R (closed to bottom)
//     overhangs:[ [[x,y],...], ... ],            // optional closed polygons (lips/arches/caves)
//     pillars:[ [[x,y],...], ... ],              // optional standing/floating blocks
//     water:[ {x0,x1,top}, ... ],  lava:[...],   // optional pools (filled top→terrain)
//     tee:[x,y], cup:[x,y],                       // y on the surface
//     blurb, inspiration }
var cv = document.getElementById('c'), ctx = cv.getContext('2d');
var CW = 800, CH = 500;
function mapX(x){ return x/1000*CW; }
function mapY(y){ return y/600*CH; }

// ── palettes (flat; sky gradient + terrain 3-tone + accents) ──
var PAL = {
  mars:   { sky:['#1a0f0c','#2a1410','#3a1a12'], fill:'#c45c4a', shade:'#8f3d30', lip:'#e07e5f', water:'#3a6ea5', lava:'#ff5a2a' },
  earth:  { sky:['#08090f','#0f1622','#172534'], fill:'#3f8f3a', shade:'#2f7330', lip:'#5cb653', water:'#2f6fb0', lava:'#ff6a2a' },
  ice:    { sky:['#0a1622','#10263a','#16384f'], fill:'#9fd6e6', shade:'#6fa9c2', lip:'#d6f2fb', water:'#2f8fc0', lava:'#ff7a3a' },
  jade:   { sky:['#08140f','#0e2419','#143424'], fill:'#2fae7a', shade:'#1f8a5e', lip:'#6cf0b0', water:'#2fae9a', lava:'#ff7a3a' },
  violet: { sky:['#120a1a','#1e1030','#2a1644'], fill:'#8a5cc4', shade:'#653f9a', lip:'#c8a8f0', water:'#6a4fc0', lava:'#ff5aa0' },
  amber:  { sky:['#1a1206','#2a1c0a','#3a260e'], fill:'#e0a23c', shade:'#b07c26', lip:'#ffd27a', water:'#3a8ea5', lava:'#ff7a2a' },
  coral:  { sky:['#1a0c10','#2a1018','#3a1622'], fill:'#e06a72', shade:'#b04a52', lip:'#ffa8b0', water:'#3a7ea5', lava:'#ff5a4a' },
  slate:  { sky:['#0d1118','#161c26','#1f2734'], fill:'#46505e', shade:'#3a424e', lip:'#7d8a9a', water:'#3a6ea5', lava:'#ff6a3a' },
  dusk:   { sky:['#160c1a','#241430','#341e44'], fill:'#c06a9a', shade:'#964a76', lip:'#f0a8d0', water:'#5a6fc0', lava:'#ff6a8a' },
};

function stars(seed){ // deterministic per render
  for (var i=0;i<70;i++){ var sx=(i*197+seed*13)%CW, sy=(i*119+seed*7)%(CH*0.7), b=(i%7===0)?2:1;
    ctx.fillStyle=(i%5===0)?'rgba(190,210,255,0.8)':'rgba(255,255,255,0.4)'; ctx.fillRect(sx,sy,b,b); } }

function terrainPath(pts, closeBottom){
  ctx.beginPath(); ctx.moveTo(mapX(pts[0][0]), mapY(pts[0][1]));
  for (var i=1;i<pts.length;i++) ctx.lineTo(mapX(pts[i][0]), mapY(pts[i][1]));
  if (closeBottom){ ctx.lineTo(CW,CH); ctx.lineTo(0,CH); } ctx.closePath();
}
function polyPath(poly){ ctx.beginPath(); ctx.moveTo(mapX(poly[0][0]),mapY(poly[0][1]));
  for(var i=1;i<poly.length;i++) ctx.lineTo(mapX(poly[i][0]),mapY(poly[i][1])); ctx.closePath(); }

function fillBlock(poly,P){ // flat-faceted solid w/ shadow + lip
  ctx.save(); polyPath(poly); ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.translate(3,5); ctx.fill(); ctx.restore();
  polyPath(poly); ctx.fillStyle=P.fill; ctx.fill();
  ctx.lineWidth=2; ctx.strokeStyle=P.shade; ctx.stroke();
  // top lip = brightest edge along the upper silhouette
  ctx.lineWidth=3; ctx.strokeStyle=P.lip; ctx.beginPath();
  var top=poly.slice().sort(function(a,b){return a[1]-b[1];}).slice(0,2);
  ctx.moveTo(mapX(top[0][0]),mapY(top[0][1])); ctx.lineTo(mapX(top[1][0]),mapY(top[1][1])); ctx.stroke();
}

function drawFlag(cx,cy,P){
  cx=mapX(cx); cy=mapY(cy);
  ctx.fillStyle='#160f0c'; ctx.fillRect(cx-9,cy-2,18,10);            // carved cup notch
  ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(cx-9,cy-2,18,2);
  ctx.strokeStyle='#7888a0'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cx+9,cy); ctx.lineTo(cx+9,cy-46); ctx.stroke();
  ctx.fillStyle='#e8c840'; ctx.beginPath(); ctx.moveTo(cx+9,cy-46); ctx.lineTo(cx+31,cy-40);
  ctx.lineTo(cx+37,cy-34); ctx.lineTo(cx+31,cy-30); ctx.lineTo(cx+9,cy-31); ctx.closePath(); ctx.fill();
}
function drawBall(tx,ty){
  var x=mapX(tx), y=mapY(ty)-7, r=7;
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x,y,r,0,6.2832); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.32)'; for(var i=0;i<3;i++){var a=(i/3)*6.2832-0.6;
    ctx.beginPath(); ctx.arc(x+Math.cos(a)*r*0.5,y+Math.sin(a)*r*0.5,r*0.2,0,6.2832); ctx.fill();}
}

window.__render = function(spec){
  var P = PAL[spec.palette] || PAL.mars; var seed = (spec.name||'x').length*7 + (spec.tee?spec.tee[0]:0)|0;
  // sky
  var g=ctx.createLinearGradient(0,0,0,CH); g.addColorStop(0,P.sky[0]); g.addColorStop(0.6,P.sky[1]); g.addColorStop(1,P.sky[2]);
  ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH); stars(seed);
  // water/lava BEHIND terrain (terrain occludes → flush)
  function pool(list,color,alpha){ if(!list)return; for(var i=0;i<list.length;i++){var w=list[i];
    ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle=color; ctx.fillRect(mapX(w.x0),mapY(w.top),mapX(w.x1)-mapX(w.x0),CH);
    ctx.globalAlpha=alpha*0.5; ctx.fillStyle='#fff'; ctx.fillRect(mapX(w.x0),mapY(w.top),mapX(w.x1)-mapX(w.x0),2); ctx.restore(); } }
  pool(spec.water,P.water,0.72); pool(spec.lava,P.lava,0.9);
  // terrain body
  if (spec.terrain){ terrainPath(spec.terrain,true);
    ctx.save(); ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.translate(0,6); ctx.fill(); ctx.restore();
    terrainPath(spec.terrain,true); ctx.fillStyle=P.fill; ctx.fill();
    terrainPath(spec.terrain,true); ctx.fillStyle=P.shade; ctx.save(); ctx.clip();
      terrainPath(spec.terrain.map(function(p){return [p[0],p[1]+10];}),true); ctx.fill(); ctx.restore();
    // surface lip
    ctx.lineWidth=3; ctx.strokeStyle=P.lip; terrainPath(spec.terrain,false); ctx.stroke(); }
  // overhangs + pillars (flat blocks)
  if (spec.overhangs) for (var o=0;o<spec.overhangs.length;o++) fillBlock(spec.overhangs[o],P);
  if (spec.pillars)   for (var p=0;p<spec.pillars.length;p++)   fillBlock(spec.pillars[p],P);
  // ball + flag
  if (spec.tee) drawBall(spec.tee[0],spec.tee[1]);
  if (spec.cup) drawFlag(spec.cup[0],spec.cup[1],P);
  // label
  ctx.textAlign='left'; ctx.fillStyle='rgba(255,255,255,0.95)'; ctx.font="16px 'Departure Mono', monospace";
  ctx.fillText((spec.name||'').toUpperCase(), 16, 28);
  ctx.fillStyle='rgba(170,200,230,0.7)'; ctx.font="11px 'Departure Mono', monospace";
  if (spec.inspiration) ctx.fillText('ref: '+spec.inspiration, 16, 46);
  if (spec.category){ ctx.textAlign='right'; ctx.fillText(spec.category, CW-16, 28); ctx.textAlign='left'; }
  return spec.name||'';
};

// batch helpers for the screenshot pipeline
window.SPECS = [];
window.__load = function(arr){ window.SPECS = arr; return arr.length; };
window.__renderIdx = function(i){ return window.__render(window.SPECS[i]); };
window.__count = function(){ return window.SPECS.length; };

// a tiny default so the page isn't blank
window.__render({ name:'Mockup Board', category:'ready', palette:'mars',
  terrain:[[0,360],[200,340],[400,380],[600,330],[800,360],[1000,350]], tee:[80,348], cup:[920,353],
  inspiration:'load specs via __load() then __renderIdx(i)' });
</script>
</body>
</html>
