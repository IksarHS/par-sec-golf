<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Golf Orbit — planet gravity prototype</title>
  <link rel="preload" href="../assets/fonts/DepartureMono-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    @font-face {
      font-family: 'Departure Mono';
      src: url('../assets/fonts/DepartureMono-Regular.woff2') format('woff2'),
           url('../assets/fonts/DepartureMono-Regular.woff') format('woff');
      font-display: block;
    }
    html,body{margin:0;background:#0c0e14;overflow:hidden}
  </style>
</head>
<body>
<canvas id="c" width="960" height="540"></canvas>
<script>
// ── GOLF ORBIT ────────────────────────────────────────────────────────────────
// A small circular planet at screen center. Gravity points toward its core (radial). The ball rests
// on the surface. A big drive sends the ball into ORBIT: its path CURVES with the radial gravity and
// sails AROUND the planet, landing on the far side. Mastery = tuning angle + power against how far
// around the planet the cup sits. Flat-color art to match faceted-golf: solid fills + a lighter lip
// line on the surface, dimpled white ball, dark space sky, monospace HUD.

var cv = document.getElementById('c'), ctx = cv.getContext('2d'), W = 960, H = 540;

// ── Planet ────────────────────────────────────────────────────────────────────
var PL = { x: W / 2, y: H / 2, r: 120 };
var CORE = '#c9743f';        // flat terrain fill (faceted-golf sand)
var SHADOW = '#a85f33';      // subtle inner shadow crescent (bottom-right), NOT a concentric ring
var LIP = '#d88f55';         // lighter lip line on the surface edge
var BALL_COLOR = '#ffffff';
var BALL_R = 8;

// ── Physics ───────────────────────────────────────────────────────────────────
var G = 70;                  // gravitational strength (tuned for visible orbit arcs)
var RESTITUTION = 0.45;
var ROLL_FRICTION = 0.985;   // tangential damping while rolling on surface
var SURFACE_FRICTION = 0.04;
var MAX_POWER = 7.2;

// ── State ─────────────────────────────────────────────────────────────────────
var ball, cupAngle, strokes, stars, frame;
var aiming = false, aimSX = 0, aimSY = 0, aimCX = 0, aimCY = 0;

// Auto-demo scripting
var auto = true;     // gates the rAF loop (live page auto-plays)
var demoOn = true;   // gates the scripted demo logic (stays on for headless __step driving)
var demo;  // { phase, timer }

function rand(a, b) { return a + Math.random() * (b - a); }

function makeStars() {
  stars = [];
  for (var i = 0; i < 70; i++) stars.push({ x: Math.random() * W, y: Math.random() * H, a: rand(0.15, 0.6), s: Math.random() < 0.85 ? 1 : 2 });
}

// Place ball on the surface at a given angle (radians, standard math: 0 = +x, CCW)
function placeOnSurface(ang) {
  ball.x = PL.x + Math.cos(ang) * (PL.r + BALL_R);
  ball.y = PL.y + Math.sin(ang) * (PL.r + BALL_R);
  ball.vx = 0; ball.vy = 0;
  ball.atRest = true; ball.onGround = true;
}

function reset() {
  ball = { x: 0, y: 0, vx: 0, vy: 0, rotation: 0, atRest: true, onGround: true };
  // Ball starts at bottom of planet (pointing down, +y).
  var startAng = Math.PI / 2;          // bottom of planet
  placeOnSurface(startAng);
  // Cup sits on the FAR limb (~180deg around) so start and target are on opposite sides of the
  // planet — the orbit reads as a long sail to the far side, never confused with the start.
  // Nudge slightly off the exact top so the drive's CCW arc lands cleanly into it.
  cupAngle = startAng - Math.PI - 0.35;  // ~top of planet, far upper-right limb
  strokes = 0;
  frame = 0;
  makeStars();
  demoOn = true;
  demo = { phase: 'wait', timer: 0 };
  draw();
}

// Surface angle of a world point (relative to planet center)
function angleOf(x, y) { return Math.atan2(y - PL.y, x - PL.x); }
function distOf(x, y) { var dx = x - PL.x, dy = y - PL.y; return Math.sqrt(dx * dx + dy * dy); }

// Shortest signed angular difference a->b in (-PI, PI]
function angDiff(a, b) {
  var d = b - a;
  while (d > Math.PI) d -= 2 * Math.PI;
  while (d < -Math.PI) d += 2 * Math.PI;
  return d;
}

// Remaining arc distance (yards) from ball to cup, measured along the surface
function yardsToGo() {
  var ba = angleOf(ball.x, ball.y);
  var d = Math.abs(angDiff(ba, cupAngle));
  return d * PL.r;   // arc length in px == "yards"
}

// ── Shooting ──────────────────────────────────────────────────────────────────
// angleDeg: launch direction in screen space (0 = +x / right, CCW positive, like canvas-y-down math).
// Internally we use atan2(y,x) so a drag-back vector defines launch dir.
function shootVec(vx, vy) {
  ball.vx = vx; ball.vy = vy;
  ball.atRest = false; ball.onGround = false;
  strokes++;
}
window.__shoot = function (angleDeg, power01) {
  var p = Math.max(0, Math.min(1, power01)) * MAX_POWER;
  var a = angleDeg * Math.PI / 180;
  shootVec(Math.cos(a) * p, Math.sin(a) * p);
};

// Aim release from a drag-back: launch opposite the drag, power from drag length
function releaseAim() {
  var dx = aimSX - aimCX, dy = aimSY - aimCY;   // launch dir = from cursor back to start
  var dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 6) return;
  var power = Math.min(dist * 0.045, MAX_POWER);
  var a = Math.atan2(dy, dx);
  shootVec(Math.cos(a) * power, Math.sin(a) * power);
}

// ── Physics step ──────────────────────────────────────────────────────────────
function physics() {
  if (ball.atRest) return;
  var sub = 3;
  for (var s = 0; s < sub; s++) {
    // Radial gravity toward planet center
    var dx = PL.x - ball.x, dy = PL.y - ball.y;
    var d2 = dx * dx + dy * dy;
    var d = Math.sqrt(d2) || 0.0001;
    // Constant-ish field near surface (inverse falloff softened) — gives clean, readable orbit arcs
    var g = G / Math.max(d, PL.r);   // stronger near surface, gently weaker far out
    ball.vx += (dx / d) * g / sub;
    ball.vy += (dy / d) * g / sub;

    ball.x += ball.vx / sub;
    ball.y += ball.vy / sub;

    // Surface collision
    var nd = distOf(ball.x, ball.y);
    var surf = PL.r + BALL_R;
    if (nd < surf) {
      var nx = (ball.x - PL.x) / nd, ny = (ball.y - PL.y) / nd;  // outward normal
      // push out
      ball.x = PL.x + nx * surf;
      ball.y = PL.y + ny * surf;
      // velocity into normal/tangent
      var vn = ball.vx * nx + ball.vy * ny;          // radial component (negative = into ground)
      var tx = -ny, ty = nx;                          // tangent
      var vt = ball.vx * tx + ball.vy * ty;           // tangential component
      if (vn < 0) vn = -vn * RESTITUTION;             // bounce
      ball.onGround = true;
      ball.vx = nx * vn + tx * vt;
      ball.vy = ny * vn + ty * vt;
    } else if (nd > surf + 1.5) {
      ball.onGround = false;
    }
  }

  // Friction + rest when rolling on the surface
  var nd = distOf(ball.x, ball.y);
  if (ball.onGround && nd <= PL.r + BALL_R + 1.5) {
    var nx = (ball.x - PL.x) / nd, ny = (ball.y - PL.y) / nd;
    var tx = -ny, ty = nx;
    var vt = ball.vx * tx + ball.vy * ty;
    var vn = ball.vx * nx + ball.vy * ny;
    vt *= ROLL_FRICTION;
    if (Math.abs(vt) > SURFACE_FRICTION) vt -= Math.sign(vt) * SURFACE_FRICTION; else vt = 0;
    ball.vx = nx * vn + tx * vt;
    ball.vy = ny * vn + ty * vt;
    ball.rotation += vt / BALL_R;
    var speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    if (speed < 0.06) { ball.vx = 0; ball.vy = 0; ball.atRest = true; }
  } else {
    ball.rotation += 0.05;
  }
}

// Has the ball settled near the cup?
function sunk() {
  return ball.atRest && yardsToGo() < 14;
}

// ── Auto demo ─────────────────────────────────────────────────────────────────
// Phase 1: a powerful drive that arcs most of the way around the planet, landing near the cup.
// Phase 2: a gentle putt to sink it.  Then pause and loop.
function driveShot() {
  // Launch nearly tangent to the surface at the start point, with a slight outward lift, going CCW
  // (toward the cup). Start is at bottom (angle +90deg). CCW tangent points toward +x rotated...
  // tangent CCW = (-sin, cos) of surface angle. Add slight outward (radial) lift.
  var sa = angleOf(ball.x, ball.y);
  var tx = -Math.sin(sa), ty = Math.cos(sa);     // CCW tangent
  var rx = Math.cos(sa), ry = Math.sin(sa);      // outward
  var dir = { x: tx * 0.82 + rx * 0.58, y: ty * 0.82 + ry * 0.58 };
  var m = Math.sqrt(dir.x * dir.x + dir.y * dir.y);
  var p = MAX_POWER * 0.92;
  shootVec(dir.x / m * p, dir.y / m * p);
}
function puttShot() {
  // Gentle nudge along the surface toward the cup (CCW)
  var sa = angleOf(ball.x, ball.y);
  var toCup = angDiff(sa, cupAngle);
  var sign = toCup >= 0 ? 1 : -1;                // CCW if cup is ahead
  var tx = -Math.sin(sa) * sign, ty = Math.cos(sa) * sign;
  var rx = Math.cos(sa), ry = Math.sin(sa);
  var dir = { x: tx * 0.9 + rx * 0.25, y: ty * 0.9 + ry * 0.25 };
  var m = Math.sqrt(dir.x * dir.x + dir.y * dir.y);
  // Scale power to remaining distance so it doesn't overshoot
  var ytg = yardsToGo();
  var p = Math.min(MAX_POWER * 0.5, 1.0 + ytg * 0.004);
  shootVec(dir.x / m * p, dir.y / m * p);
}

function autoDemo() {
  // Drives the scripted demo. Gated by demoOn (not auto) so headless __step() can advance it
  // deterministically even when the rAF loop is disabled.
  if (!demoOn) return;
  if (!demo) demo = { phase: 'wait', timer: 0 };   // self-heal if driven before first reset
  demo.timer++;
  switch (demo.phase) {
    case 'wait':
      if (demo.timer > 45) { driveShot(); demo.phase = 'drive'; demo.timer = 0; }
      break;
    case 'drive':
      if (ball.atRest && demo.timer > 20) { demo.phase = 'preputt'; demo.timer = 0; }
      // Failsafe: if it never rests (rare), force after a while
      if (demo.timer > 800) { demo.phase = 'preputt'; demo.timer = 0; }
      break;
    case 'preputt':
      if (demo.timer > 50) {
        if (sunk()) { demo.phase = 'sunk'; demo.timer = 0; }
        else { puttShot(); demo.phase = 'putt'; demo.timer = 0; }
      }
      break;
    case 'putt':
      if (ball.atRest && demo.timer > 15) { demo.phase = sunk() ? 'sunk' : 'preputt'; demo.timer = 0; }
      if (demo.timer > 600) { demo.phase = 'preputt'; demo.timer = 0; }
      break;
    case 'sunk':
      if (demo.timer > 90) { reset(); }
      break;
  }
}

// ── Drawing ───────────────────────────────────────────────────────────────────
function drawSky() {
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#1a2230'); g.addColorStop(1, '#26303c');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  for (var i = 0; i < stars.length; i++) {
    var st = stars[i];
    ctx.globalAlpha = st.a;
    ctx.fillStyle = '#cdd8e6';
    ctx.fillRect(st.x, st.y, st.s, st.s);
  }
  ctx.globalAlpha = 1;
}

function drawPlanet() {
  // Single flat-color sand body (no concentric "bullseye" disc — matches src/art.js flat fills)
  ctx.fillStyle = CORE;
  ctx.beginPath();
  ctx.arc(PL.x, PL.y, PL.r, 0, Math.PI * 2);
  ctx.fill();

  // ONE subtle inner shadow crescent for depth: a darker disc offset toward bottom-right,
  // clipped to the planet body. This reads as a soft terminator shadow, not a centered ring.
  ctx.save();
  ctx.beginPath();
  ctx.arc(PL.x, PL.y, PL.r, 0, Math.PI * 2);
  ctx.clip();
  ctx.fillStyle = SHADOW;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  // A same-size shadow disc nudged toward bottom-right; intersected with the body it leaves
  // only a thin (~8px) darker crescent hugging the bottom-right rim.
  ctx.arc(PL.x + 8, PL.y + 8, PL.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Lighter lip line on the surface edge ONLY (4px ring on the rim)
  ctx.strokeStyle = LIP;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(PL.x, PL.y, PL.r - 2, 0, Math.PI * 2);
  ctx.stroke();
}

function drawCup() {
  // Cup notch on the surface at cupAngle
  var cx = PL.x + Math.cos(cupAngle) * PL.r;
  var cy = PL.y + Math.sin(cupAngle) * PL.r;
  // outward normal + tangent
  var nx = Math.cos(cupAngle), ny = Math.sin(cupAngle);
  var tx = -ny, ty = nx;
  var halfW = 8, depth = 12;
  ctx.fillStyle = '#23150d';
  ctx.beginPath();
  ctx.moveTo(cx + tx * halfW, cy + ty * halfW);
  ctx.lineTo(cx + tx * (halfW * 0.6) - nx * depth, cy + ty * (halfW * 0.6) - ny * depth);
  ctx.lineTo(cx - tx * (halfW * 0.6) - nx * depth, cy - ty * (halfW * 0.6) - ny * depth);
  ctx.lineTo(cx - tx * halfW, cy - ty * halfW);
  ctx.closePath();
  ctx.fill();

  // Flag pole (radial, pointing outward)
  var poleH = 55;                                 // matches art.js drawFlag poleH
  var px = cx + nx * poleH, py = cy + ny * poleH;
  ctx.strokeStyle = '#7888a0';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(px, py);
  ctx.stroke();

  // Pennant — PENTAGON (rectangle body + triangular point), exactly like art.js drawFlag.
  // Built in the cup's tangent/normal basis: tangent t = along the flag's "width" (body extends
  // sideways from the pole), normal n = radially outward. bodyW 22 / pointW 10, body height 16px.
  var bodyW = 22, pointW = 10, bodyH = 16;
  // Top edge of the pennant sits at the pole tip; body drops 16px back down the pole (inward).
  var topX = px,            topY = py;            // at pole tip
  var botX = px - nx * bodyH, botY = py - ny * bodyH; // 16px down the pole toward surface
  var midX = (topX + botX) / 2, midY = (topY + botY) / 2;
  ctx.fillStyle = '#e8c840';
  ctx.beginPath();
  ctx.moveTo(topX, topY);                                   // pole-side top
  ctx.lineTo(topX + tx * bodyW, topY + ty * bodyW);         // body top-outer
  ctx.lineTo(midX + tx * (bodyW + pointW), midY + ty * (bodyW + pointW)); // triangular point
  ctx.lineTo(botX + tx * bodyW, botY + ty * bodyW);         // body bottom-outer
  ctx.lineTo(botX, botY);                                   // pole-side bottom
  ctx.closePath();
  ctx.fill();

  // Hole number centered on the pennant body (art.js: '10px Departure Mono', #4a3520)
  var lblX = midX + tx * (bodyW / 2), lblY = midY + ty * (bodyW / 2);
  ctx.fillStyle = '#4a3520';
  ctx.font = "10px 'Departure Mono', monospace";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('1', lblX, lblY);
  ctx.textBaseline = 'alphabetic';
}

function drawBall() {
  ctx.fillStyle = BALL_COLOR;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
  ctx.fill();
  // 3 dimples at 0/120/240, rotating with travel
  ctx.save();
  ctx.translate(ball.x, ball.y);
  ctx.rotate(ball.rotation || 0);
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  for (var i = 0; i < 3; i++) {
    var a = (i / 3) * Math.PI * 2;
    ctx.beginPath();
    ctx.arc(Math.cos(a) * BALL_R * 0.5, Math.sin(a) * BALL_R * 0.5, 1.4, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// Simulate the launch trajectory under radial gravity and return sampled points (world space).
// Mirrors physics() so the predicted dotted arc curves around the planet exactly as the shot will.
function predictArc(vx, vy) {
  var px = ball.x, py = ball.y, pvx = vx, pvy = vy;
  var pts = [];
  var liftedOff = false;                    // becomes true once the preview clears the surface
  for (var i = 0; i < 600; i++) {
    var gdx = PL.x - px, gdy = PL.y - py;
    var gd = Math.sqrt(gdx * gdx + gdy * gdy) || 0.0001;
    var g = G / Math.max(gd, PL.r);
    pvx += (gdx / gd) * g;
    pvy += (gdy / gd) * g;
    px += pvx; py += pvy;
    var alt = gd - (PL.r + BALL_R);         // height above surface
    if (alt > 3) liftedOff = true;
    if (i % 4 === 0 && alt > -2) pts.push({ x: px, y: py }); // only sample at/above surface
    // stop once it has lifted off and then re-touched the far-side surface
    if (liftedOff && alt < 0) break;
  }
  return pts;
}

function drawAim() {
  if (!aiming) return;
  var dx = aimCX - aimSX, dy = aimCY - aimSY;
  var dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 6) return;
  // launch end (opposite drag)
  var lx = aimSX - dx, ly = aimSY - dy;

  // Faint predicted-arc dotted trajectory (curves with gravity) — teaches the orbit hook.
  var ldx = aimSX - aimCX, ldy = aimSY - aimCY;       // launch dir (opposite drag)
  var lmag = Math.sqrt(ldx * ldx + ldy * ldy) || 1;
  var lpow = Math.min(dist * 0.045, MAX_POWER);
  var arc = predictArc(ldx / lmag * lpow, ldy / lmag * lpow);
  ctx.fillStyle = 'rgba(205,238,252,0.5)';
  for (var ai = 0; ai < arc.length; ai++) {
    var fade = 1 - ai / arc.length;
    ctx.globalAlpha = 0.5 * fade + 0.1;
    ctx.beginPath();
    ctx.arc(arc[ai].x, arc[ai].y, 1.7, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  // dashed aim line from ball to launch end
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 5]);
  ctx.beginPath();
  ctx.moveTo(aimSX, aimSY);
  ctx.lineTo(lx, ly);
  ctx.stroke();
  ctx.setLineDash([]);
  // arrowhead
  var la = Math.atan2(-dy, -dx);
  ctx.beginPath();
  ctx.moveTo(lx, ly);
  ctx.lineTo(lx - 10 * Math.cos(la - 0.45), ly - 10 * Math.sin(la - 0.45));
  ctx.moveTo(lx, ly);
  ctx.lineTo(lx - 10 * Math.cos(la + 0.45), ly - 10 * Math.sin(la + 0.45));
  ctx.stroke();
  // power bar (bottom-left)
  var pwr = Math.min(dist * 0.045, MAX_POWER) / MAX_POWER;
  var bx = 26, by = H - 40, bw = 160, bh = 10;
  ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);
  ctx.fillStyle = pwr > 0.8 ? '#e8c840' : '#cdeefc';
  ctx.fillRect(bx + 1, by + 1, (bw - 2) * pwr, bh - 2);
}

function drawHUD() {
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.font = "22px 'Departure Mono', monospace";
  ctx.fillText('GOLF ORBIT', 24, 38);
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font = "12px 'Departure Mono', monospace";
  ctx.fillText('drag BACK from the ball to drive · curve it around the planet into the cup', 24, 58);
  // yards to go
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.font = "13px 'Departure Mono', monospace";
  ctx.fillText(Math.round(yardsToGo()) + ' yds to go', 24, 78);
  ctx.fillText('strokes: ' + strokes, 24, 96);
  if (sunk()) {
    ctx.fillStyle = '#e8c840';
    ctx.font = "20px 'Departure Mono', monospace";
    ctx.fillText('SUNK!', 24, 122);
  }
}

function draw() {
  drawSky();
  drawPlanet();
  drawCup();
  drawBall();
  drawAim();
  drawHUD();
}

// ── Loop ──────────────────────────────────────────────────────────────────────
function ensureInit() {
  // Bulletproof against any environment where the bottom-of-file reset() did not initialize
  // state before driving (e.g. headless eval worlds). Idempotent.
  if (!ball || !demo || !stars) reset();
}
function step() {
  ensureInit();
  frame++;
  autoDemo();
  physics();
  draw();
}

window.__step = function () { step(); };
window.__reset = reset;
window.__frame = function () { return frame; };
window.__setAuto = function (a) { auto = a; };
window.__state = function () { ensureInit(); return { phase: demo.phase, ytg: yardsToGo(), strokes: strokes, atRest: ball.atRest, sunk: sunk() }; };

(function loop() { if (auto) step(); requestAnimationFrame(loop); })();

// ── Manual play (click/drag) ──────────────────────────────────────────────────
function toCanvas(e) {
  var r = cv.getBoundingClientRect();
  return { x: (e.clientX - r.left) * (cv.width / r.width), y: (e.clientY - r.top) * (cv.height / r.height) };
}
cv.addEventListener('mousedown', function (e) {
  if (!ball.atRest) return;
  demoOn = false;               // hand control to the player — stop the scripted demo
  var p = toCanvas(e);
  aiming = true; aimSX = p.x; aimSY = p.y; aimCX = p.x; aimCY = p.y;
});
window.addEventListener('mousemove', function (e) {
  if (!aiming) return;
  var p = toCanvas(e); aimCX = p.x; aimCY = p.y;
});
window.addEventListener('mouseup', function () {
  if (!aiming) return;
  aiming = false;
  releaseAim();
});

reset();
</script>
</body>
</html>
