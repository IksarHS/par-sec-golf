<!DOCTYPE html>

<!-- Start the web-font download immediately (before the @font-face rule is parsed) so the
     loading splash can show its text already in Departure Mono — no fallback->web swap flash. -->
<link rel="preload" href="assets/fonts/DepartureMono-Regular.woff2" as="font" type="font/woff2" crossorigin>
<!-- Favicon = the in-game ball: white circle + 3 dimples at 0/120/240deg (echoes src/art.js drawBall). -->
<link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'&gt;&lt;circle cx='8' cy='8' r='6' fill='%23ffffff'/&gt;&lt;circle cx='11.3' cy='8' r='1.4' fill='%23000' opacity='.28'/&gt;&lt;circle cx='6.35' cy='10.86' r='1.4' fill='%23000' opacity='.28'/&gt;&lt;circle cx='6.35' cy='5.14' r='1.4' fill='%23000' opacity='.28'/&gt;&lt;/svg&gt;">
<style>
  @font-face {
    font-family: 'Departure Mono';
    src: url('assets/fonts/DepartureMono-Regular.woff2') format('woff2'),
         url('assets/fonts/DepartureMono-Regular.woff') format('woff');
    font-weight: normal; font-style: normal; font-display: swap;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: #0e0b12; }
  body { display: flex; align-items: center; justify-content: center;
    font-family: 'Departure Mono', monospace; color: #f2ecff; }
  canvas { display: block; cursor: crosshair; position: relative; z-index: 1; max-width: 100vw; max-height: 100vh; }

  /* ── In-run HUD (top-left; takes over the spot the course title vacates) ── */
  #rg-hud { position: fixed; top: 16px; left: 22px; z-index: 50; display: none;
    flex-direction: column; align-items: flex-start; gap: 2px; pointer-events: none; }
  .rg-hud-hole { font-size: 19px; font-weight: normal; color: rgba(242,236,255,0.82); letter-spacing: 2px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
  .rg-hud-shards { font-size: 13px; color: #b88cff; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
</style>
</head>
<body>
<!-- Loading splash. The dark background paints instantly (no white/blank flash), but the text
     is held at opacity:0 until Departure Mono is loaded — so it is only ever drawn in the web
     font, at its final position. No font-display:swap reflow, no font/position jump. -->
<div id="loading" style="position:fixed;inset:0;background:#0e0b12;z-index:9999;display:flex;align-items:center;justify-content:center;">
  <span id="loading-text" style="font:48px 'Departure Mono',monospace;color:rgba(242,236,255,0.45);opacity:0;transition:opacity .12s linear;">Loading…</span>
</div>
<script>
  // Reveal the loading text only once the web font is ready (so it never paints in the system
  // fallback first). A short fallback timer guarantees the text still shows if the font is slow
  // or unavailable — boot is never blocked on this.
  (function () {
    var t = document.getElementById('loading-text');
    if (!t) return;
    var shown = false;
    function show() { if (shown) return; shown = true; t.style.opacity = '1'; }
    if (document.fonts && document.fonts.load) {
      document.fonts.load("48px 'Departure Mono'").then(show, show);
      // Belt-and-suspenders: if the font promise stalls, reveal anyway after 600ms.
      setTimeout(show, 600);
    } else {
      show();
    }
  })();
</script>
<canvas id="c" style="visibility:hidden;"></canvas>

<!-- In-run HUD (populated by the run controller) -->
<div id="rg-hud"></div>

<script>window.RG_MINIMAL = !/[?&](full|secrets)(=|&|$)/.test(location.search);</script>

<script src="src/roguelike/atlas-climb.js"></script>
<!-- The Stacks (?course=blocks) — NEW flexible-terrain tech: the ball collides with solid floating BLOCKS
     (circle-vs-AABB) for overhangs / floating platforms / gaps a heightfield can't do. Adds one inert
     hook (RG_ATLAS.collide, dispatched from wrap.js). Peel it off → the hook goes inert, base unchanged. -->
<script src="src/roguelike/atlas-blocks.js"></script>
<script src="src/roguelike/atlas-objects.js"></script>
<script src="src/roguelike/atlas-setpieces.js"></script>
<script src="src/main.js"></script>
<!-- Dev shortcut: jump straight to a BASE course (the Moon tiers) for testing. ?course= is otherwise
     intercepted by the atlas selector (galaxy.js), so this overrides it once RG is ready. -->
<script>
(function () {
  var m = /[?&](?:course|gomoon)=([a-z0-9-]+)/i.exec(location.search);
  if (!m) return;
  var v = m[1].toLowerCase();
  var alias = { '1': 'moon', '2': 'moon2', '3': 'moon3' };
  var course = alias[v] || v;
  var n = 0;
  (function go() {
    if (window.RG && RG.startRun && typeof holes !== 'undefined' && holes.length > 0
        && WORLDS['run-world'] && WORLDS['run-world'].courses[course]) {   // only override for a REAL base course
      setTimeout(function () { try { RG.startRun({ course: course, seed: (RG.rollSeed ? RG.rollSeed() : 12345) }); } catch (e) {} }, 150);
    } else if (n++ < 240) setTimeout(go, 50);
  })();
})();
</script>
