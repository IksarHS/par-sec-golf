<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Water — fill &amp; overflow</title>
<style>html,body{margin:0;background:#0c0e14;overflow:hidden}</style></head>
<body>
<canvas id="c" width="960" height="540"></canvas>
<script>
// ── WATER FILLING A PIT + OVERFLOWING ─────────────────────────────────────────
// A trapezoid pit. Water pours in (a stream), VOLUME accumulates so the level RISES (slower as the pit
// widens), the surface ripples (height-field) from the pour, and when the level reaches the rim it caps
// and SPILLS over both edges. Then it loops.
var cv = document.getElementById('c'), ctx = cv.getContext('2d'), W = 960, H = 540;
var groundY = 290, floorY = 462, RIML = 210, RIML2 = 300, RIMR2 = 600, RIMR = 690;   // pit geometry
function terrainY(x) {
  if (x <= RIML) return groundY;
  if (x < RIML2) return groundY + (floorY - groundY) * ((x - RIML) / (RIML2 - RIML));
  if (x <= RIMR2) return floorY;
  if (x < RIMR) return floorY + (groundY - floorY) * ((x - RIMR2) / (RIMR - RIMR2));
  return groundY;
}
function wallX(level, side) {                                  // x of the wall at a given water level
  var t = Math.max(0, Math.min(1, (level - groundY) / (floorY - groundY)));   // 0 at rim, 1 at floor
  return side < 0 ? (RIML + (RIML2 - RIML) * t) : (RIMR - (RIMR - RIMR2) * t);
}
var N = 150, X0 = RIML, X1 = RIMR, dx = (X1 - X0) / (N - 1);
var h = new Float32Array(N), v = new Float32Array(N);
var waterLevel, pourOn, overflowing, drops, frame, fade, pourRate = 1150, pourX = 450;

function reset() { waterLevel = floorY; pourOn = true; overflowing = false; drops = []; frame = 0; fade = 0; h.fill(0); v.fill(0); draw(); }
function ripple(cx, sp) { var idx = Math.round((cx - X0) / dx); for (var i = -3; i <= 3; i++) { var j = idx + i; if (j >= 1 && j < N - 1) v[j] -= sp * Math.exp(-i * i * 0.3); } }
function stepWater() { var T = 0.02, S = 0.28, D = 0.978; for (var i = 0; i < N; i++) { var l = i > 0 ? h[i - 1] : h[i], r = i < N - 1 ? h[i + 1] : h[i]; v[i] += (-T * h[i]) + S * ((l + r) * 0.5 - h[i]); v[i] *= D; } for (var i = 0; i < N; i++) h[i] += v[i]; }
function surfY(x) { var idx = Math.max(0, Math.min(N - 1, Math.round((x - X0) / dx))); return waterLevel + h[idx]; }

function step() {
  frame++;
  if (pourOn && !overflowing) {
    var w = wallX(waterLevel, 1) - wallX(waterLevel, -1);
    waterLevel -= pourRate / Math.max(70, w);
    if (waterLevel <= groundY) { waterLevel = groundY; overflowing = true; }
  }
  if (pourOn) ripple(pourX, 0.45);
  stepWater();
  if (pourOn && Math.random() < 0.5) { var a = -Math.PI / 2 + (Math.random() - 0.5) * 1.3, s = 1 + Math.random() * 2; drops.push({ x: pourX + (Math.random() - 0.5) * 14, y: surfY(pourX) - 2, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0, max: 24, sz: 1.5 + Math.random() * 1.6, c: '#9bd4f2' }); }
  if (overflowing && pourOn) for (var sgn = -1; sgn <= 1; sgn += 2) if (Math.random() < 0.8) { var sx = sgn < 0 ? RIML : RIMR; drops.push({ x: sx, y: groundY - 1, vx: sgn * (1.1 + Math.random() * 1.4), vy: -0.4 + Math.random() * 0.4, life: 0, max: 60, sz: 2 + Math.random() * 2, c: '#6fb0e0' }); }
  for (var i = drops.length - 1; i >= 0; i--) { var p = drops[i]; p.life++; p.vy += 0.2; p.x += p.vx; p.y += p.vy; if (p.y > H + 10 || p.life > p.max) drops.splice(i, 1); }
  if (overflowing) { if (++fade > 55) pourOn = false; }     // let it overflow a moment, then stop the pour to show it settle
  draw();
}

function draw() {
  var g = ctx.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#1a2230'); g.addColorStop(1, '#26303c'); ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#c9743f'; ctx.beginPath(); ctx.moveTo(0, terrainY(0)); for (var x = 0; x <= W; x += 3) ctx.lineTo(x, terrainY(x)); ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fill();
  // water body — surface (waterLevel + ripples) down to the terrain
  var lx = wallX(waterLevel, -1), rx = wallX(waterLevel, 1);
  function body() { ctx.beginPath(); ctx.moveTo(lx, surfY(lx)); for (var x = lx; x <= rx; x += 4) ctx.lineTo(x, surfY(x)); ctx.lineTo(rx, terrainY(rx)); for (var x = rx; x >= lx; x -= 4) ctx.lineTo(x, terrainY(x)); ctx.closePath(); }
  ctx.fillStyle = '#3a7ec8'; body(); ctx.fill();
  var wg = ctx.createLinearGradient(0, waterLevel, 0, floorY); wg.addColorStop(0, 'rgba(0,0,0,0)'); wg.addColorStop(1, 'rgba(16,40,70,0.6)'); ctx.fillStyle = wg; body(); ctx.fill();
  ctx.strokeStyle = 'rgba(205,238,252,0.5)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(lx, surfY(lx)); for (var x = lx; x <= rx; x += 4) ctx.lineTo(x, surfY(x)); ctx.stroke();
  if (overflowing && pourOn) {                                // thin overflow sheets down the outer walls
    ctx.fillStyle = 'rgba(90,160,220,0.7)';
    ctx.fillRect(RIML - 16, groundY, 16, 8); ctx.fillRect(RIMR, groundY, 16, 8);
  }
  if (pourOn) { ctx.fillStyle = 'rgba(95,165,225,0.9)'; var by = surfY(pourX) - 2; for (var y = 0; y < by; y += 6) { var wob = Math.sin(y * 0.1 + frame * 0.5) * 1.6; ctx.fillRect(pourX - 4 + wob, y, 8, 6); } }
  for (var i = 0; i < drops.length; i++) { var p = drops[i]; ctx.globalAlpha = Math.max(0, 1 - p.life / p.max) * 0.9; ctx.fillStyle = p.c; ctx.fillRect(p.x - p.sz / 2, p.y - p.sz / 2, p.sz, p.sz); } ctx.globalAlpha = 1;
  ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.font = '24px monospace'; ctx.fillText(overflowing ? 'overflowing' : 'filling…', 26, 42);
}
window.__step = step; window.__reset = reset; window.__frame = function () { return frame; };
var auto = true; window.__setAuto = function (a) { auto = a; };
(function loop() { if (auto) { step(); if (overflowing && !pourOn && frame % 240 === 0) reset(); } requestAnimationFrame(loop); })();
reset();
</script>
</body>
</html>
