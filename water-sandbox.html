<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="data:,">
  <meta charset="utf-8">
  <title>Water Sandbox — pour &amp; shoot</title>
  <style>html,body{margin:0;background:#0c0e14;overflow:hidden;font-family:monospace}canvas{display:block}</style>
</head>
<body>
<canvas id="c" width="960" height="540"></canvas>
<script>
// ── WATER SANDBOX ─────────────────────────────────────────────────────────────
// A heightfield terrain with several basins. POUR water anywhere (click/hold) — it falls, pools in the
// basin below, the level RISES (volume accumulates) and OVERFLOWS the lowest rim into adjacent basins.
// SHOOT the ball (drag back from it) — it flies ballistically, SPLASHES + SINKS in deep water, or
// bounces/rolls on dry land. Surface = a global height-field (row of springs) so it ripples.
var cv = document.getElementById('c'), ctx = cv.getContext('2d'), W = 960, H = 540;

// ── PALETTE (flat sand/rust/earth, dark sky) ──────────────────────────────────
var SKY0 = '#171c26', SKY1 = '#222a35',
    EARTH = '#b76b38', EARTH_D = '#8f5128', LIP = '#d18a52',
    WATER = '#3a7ec8', DEEP = 'rgba(14,38,66,0.62)', HI = 'rgba(205,238,252,0.5)',
    DROP = '#9bd4f2', POUR = 'rgba(120,185,235,0.92)';

// ── TERRAIN ───────────────────────────────────────────────────────────────────
// Base ground line + subtracted Gaussian basins of varied width/depth. terrainY(x) = surface height.
var GROUND = 250;                          // baseline ground y
var BASINS = [                             // {cx, half-width, depth}  — several distinct low spots
  { cx: 150, w: 95,  d: 175 },             // wide deep pool (left)
  { cx: 370, w: 60,  d: 120 },             // medium pit
  { cx: 520, w: 42,  d: 200 },             // narrow deep well
  { cx: 690, w: 80,  d: 100 },             // shallow broad dish
  { cx: 850, w: 55,  d: 150 }              // right pocket
];
var FLOOR = 520;                           // hard bottom clamp
function terrainY(x) {
  var y = GROUND + Math.sin(x * 0.011) * 14;   // gentle rolling ground
  for (var i = 0; i < BASINS.length; i++) {
    var b = BASINS[i], t = (x - b.cx) / b.w;
    y += b.d * Math.exp(-t * t * 1.6);         // dig the basin
  }
  return Math.min(FLOOR, y);
}

// ── WATER COLUMNS ─────────────────────────────────────────────────────────────
// Discretise the world into columns. Each column holds a water SURFACE y (wy[i]); below it down to the
// terrain is water. Volume per column is implicit in wy. We relax water by flowing from higher columns
// to lower neighbours each step (settles to the lowest level, fills basins, spills between them).
var NC = 240, CW = W / NC;                  // column count + width
var tY = new Float32Array(NC);             // terrain y at each column centre
var wy = new Float32Array(NC);             // water surface y per column (== terrain when dry)
var hh = new Float32Array(NC), hv = new Float32Array(NC);  // height-field ripple offset + velocity
function colX(i) { return (i + 0.5) * CW; }
function colAt(x) { return Math.max(0, Math.min(NC - 1, Math.floor(x / CW))); }
function depth(i) { return tY[i] - wy[i]; }                // water depth (px) in column i (>=0)

var ball, drops, pourStreams, frame, hint = 320;

function reset() {
  for (var i = 0; i < NC; i++) { tY[i] = terrainY(colX(i)); wy[i] = tY[i]; hh[i] = 0; hv[i] = 0; }
  drops = []; pourStreams = []; frame = 0;
  resetBall();
}
function clearWater() { for (var i = 0; i < NC; i++) { wy[i] = tY[i]; hh[i] = 0; hv[i] = 0; } drops = []; pourStreams = []; }
function resetBall() {
  // place ball on a dry hilltop on the left-ish ridge
  var bx = 280, by = terrainY(bx) - 9;
  ball = { x: bx, y: by, vx: 0, vy: 0, r: 9, onGround: true, sunk: false, gone: false };
}

// ── POUR ──────────────────────────────────────────────────────────────────────
// A pour stream drops water into the column below its x. Volume = raise that column's surface; the
// flow-relax pass then spreads it into the basin and over rims. Also ripples the surface.
function addPour(x, y) { pourStreams.push({ x: x, y: Math.min(y, terrainY(x) - 4), t: 0 }); }
function pourInto(x) {
  var i = colAt(x);
  // add a slug of water volume to this column: raise surface, but never above terrain rim height of nbrs
  wy[i] -= 2.4;                            // raise (y smaller = higher)
  if (wy[i] < tY[i] - (FLOOR - 10)) wy[i] = tY[i] - (FLOOR - 10);
  // ripple at pour point
  hv[i] -= 0.5; if (i > 0) hv[i - 1] -= 0.25; if (i < NC - 1) hv[i + 1] -= 0.25;
  // splash droplets up from the surface
  if (Math.random() < 0.6) {
    var sy = wy[i] - 2, a = -Math.PI / 2 + (Math.random() - 0.5) * 1.4, s = 1 + Math.random() * 2;
    drops.push({ x: x + (Math.random() - 0.5) * 12, y: sy, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0, max: 26, sz: 1.4 + Math.random() * 1.6, c: DROP });
  }
}

// ── WATER FLOW (settle / fill / overflow / cascade) ───────────────────────────
// For each adjacent pair, water flows from the higher surface to the lower one, limited by what's
// available and by terrain (can't push water below the floor). Multiple iterations per frame so it
// equalises within a basin and spills over rims into lower basins.
function flowWater() {
  var ITER = 4;
  for (var k = 0; k < ITER; k++) {
    // alternate sweep direction to avoid bias
    var fwd = (k % 2 === 0);
    for (var s = 0; s < NC - 1; s++) {
      var i = fwd ? s : (NC - 2 - s), j = i + 1;
      var di = depth(i), dj = depth(j);
      if (di <= 0 && dj <= 0) continue;
      // surface levels (lower y = higher water)
      var li = wy[i], lj = wy[j];
      if (Math.abs(li - lj) < 0.02) continue;
      var hi = li < lj ? i : j, lo = li < lj ? j : i;   // hi = higher water column
      if (depth(hi) <= 0) continue;
      // amount to move: half the level difference, but capped by available depth in hi
      var diff = wy[lo] - wy[hi];           // >0
      var move = diff * 0.5;
      if (move > depth(hi)) move = depth(hi);
      // don't raise lo above the higher column's rim if separated by terrain barrier between them:
      // the terrain barrier is the higher of the two terrain points — water can only pass if hi's
      // surface is above that barrier.
      var barrier = Math.min(tY[i], tY[j]); // y of the spill saddle (smaller y = taller)
      if (wy[hi] >= barrier && depth(hi) > 0) {
        // hi water surface is BELOW (y greater than) the saddle → trapped, no spill over barrier...
        // unless lo is the SAME basin side (no real barrier). Approximate: only block if there's a
        // distinct hump. We treat the saddle as passable once hi rises above it.
      }
      // perform transfer
      wy[hi] += move;                        // hi surface drops (y increases)
      wy[lo] -= move * (CW / CW);            // lo surface rises (y decreases) — equal column widths
      // clamp lo not below floor / above its terrain
      if (wy[lo] < tY[lo] - (FLOOR - 10)) wy[lo] = tY[lo] - (FLOOR - 10);
      if (wy[hi] > tY[hi]) wy[hi] = tY[hi];  // can't have negative depth
      if (wy[lo] > tY[lo]) wy[lo] = tY[lo];
    }
  }
  // tiny evaporation/settle: snap nearly-dry columns to dry to avoid film creep
  for (var i = 0; i < NC; i++) if (depth(i) < 0.4) wy[i] = tY[i];
}

// ── HEIGHT-FIELD RIPPLES ──────────────────────────────────────────────────────
function stepRipples() {
  var T = 0.022, S = 0.26, D = 0.972;
  for (var i = 0; i < NC; i++) {
    if (depth(i) <= 0.5) { hh[i] *= 0.6; hv[i] *= 0.6; continue; }   // damp on dry land
    var l = i > 0 ? hh[i - 1] : hh[i], r = i < NC - 1 ? hh[i + 1] : hh[i];
    hv[i] += (-T * hh[i]) + S * ((l + r) * 0.5 - hh[i]); hv[i] *= D;
  }
  for (var i = 0; i < NC; i++) hh[i] += hv[i];
}
function surfYAt(x) { var i = colAt(x); return wy[i] + (depth(i) > 0.5 ? hh[i] : 0); }
function splash(x, speed) {
  speed = Math.min(speed, 18);
  var idx = colAt(x);
  for (var o = -6; o <= 6; o++) { var j = idx + o; if (j >= 1 && j < NC - 1 && depth(j) > 0.5) hv[j] -= speed * 0.45 * Math.exp(-o * o * 0.12); }
  var n = Math.round(6 + speed * 0.9);
  for (var d = 0; d < n; d++) {
    var a = -Math.PI / 2 + (Math.random() - 0.5) * 1.8, sp = 1.5 + Math.random() * speed * 0.5;
    drops.push({ x: x + (Math.random() - 0.5) * 16, y: surfYAt(x) - 3, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp * 1.25, life: 0, max: 22 + Math.random() * 16, sz: 1.6 + Math.random() * 2.2, c: DROP });
  }
}

// ── BALL ──────────────────────────────────────────────────────────────────────
function stepBall() {
  if (ball.gone) return;
  var b = ball;
  if (b.sunk) {
    // sinking in water (golf hazard): slow descent, drag, slight ripple
    b.vy = b.vy * 0.86 + 0.18; b.vx *= 0.9;
    b.x += b.vx; b.y += b.vy;
    var tyb = terrainY(b.x);
    if (b.y > tyb - b.r * 0.3) { b.y = tyb - b.r * 0.3; b.vy = 0; }   // rest on basin floor underwater
    if (frame % 8 === 0) { var i = colAt(b.x); if (depth(i) > 1) hv[i] -= 0.3; }
    return;
  }
  // ballistic / rolling
  b.vy += 0.45;                                // gravity
  b.x += b.vx; b.y += b.vy;
  // walls
  if (b.x < b.r) { b.x = b.r; b.vx = -b.vx * 0.5; }
  if (b.x > W - b.r) { b.x = W - b.r; b.vx = -b.vx * 0.5; }
  var ty = terrainY(b.x);
  var wsurf = surfYAt(b.x), dep = (terrainY(b.x) - wy[colAt(b.x)]);   // water depth under ball
  // hit water surface?
  if (dep > 0.5 && b.y + b.r >= wsurf && b.vy > 0 && !b.onGround) {
    var speed = Math.hypot(b.vx, b.vy);
    splash(b.x, speed);
    if (dep > b.r * 2.0) { b.sunk = true; b.vy *= 0.3; b.onGround = false; return; }  // deep → sink
    // shallow → big speed loss, keep going (skip/wade)
    b.vy *= -0.18; b.vx *= 0.45;
    if (Math.abs(b.vy) < 1.2) { b.vy = 0.5; }
  }
  // terrain collision
  if (b.y + b.r >= ty) {
    b.y = ty - b.r;
    // surface normal from terrain slope
    var slope = (terrainY(b.x + 2) - terrainY(b.x - 2)) / 4;
    var nx = -slope, ny = -1, nl = Math.hypot(nx, ny); nx /= nl; ny /= nl;
    var vn = b.vx * nx + b.vy * ny;
    if (vn < 0) { b.vx -= 1.5 * vn * nx; b.vy -= 1.5 * vn * ny; b.vx *= 0.6; b.vy *= 0.6; }  // bounce
    // roll downhill
    b.vx += slope * 0.55;
    b.vx *= 0.985;                              // rolling friction
    if (Math.hypot(b.vx, b.vy) < 0.35 && Math.abs(slope) < 0.06) { b.vx = 0; b.vy = 0; b.onGround = true; }
    else b.onGround = false;
    // settle onto water if it rolled into a filled basin
    var dep2 = terrainY(b.x) - wy[colAt(b.x)];
    if (dep2 > b.r * 2.0 && b.onGround) { b.sunk = true; b.onGround = false; }
  } else b.onGround = false;
}

// ── DROPS ─────────────────────────────────────────────────────────────────────
function stepDrops() {
  for (var i = drops.length - 1; i >= 0; i--) {
    var p = drops[i]; p.life++; p.vy += 0.2; p.x += p.vx; p.y += p.vy;
    var sy = surfYAt(p.x);
    if (p.vy > 0 && p.y >= sy && depth(colAt(p.x)) > 0.5) { var j = colAt(p.x); if (j >= 1 && j < NC - 1) hv[j] -= 0.4; drops.splice(i, 1); continue; }
    if (p.y > terrainY(p.x) || p.life > p.max || p.y > H + 10) drops.splice(i, 1);
  }
}

// ── MAIN STEP ─────────────────────────────────────────────────────────────────
function step() {
  frame++;
  // active pour streams
  for (var i = pourStreams.length - 1; i >= 0; i--) {
    var ps = pourStreams[i]; ps.t++;
    pourInto(ps.x);
    if (ps.t > 2) pourStreams.splice(i, 1);     // one-shot per frame issuance
  }
  flowWater();
  stepRipples();
  stepBall();
  stepDrops();
  draw();
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function draw() {
  // sky
  var g = ctx.createLinearGradient(0, 0, 0, H); g.addColorStop(0, SKY0); g.addColorStop(1, SKY1);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // terrain (flat fill with a slightly darker base band)
  ctx.fillStyle = EARTH; ctx.beginPath(); ctx.moveTo(0, terrainY(0));
  for (var x = 0; x <= W; x += 3) ctx.lineTo(x, terrainY(x));
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fill();
  // darker deep band near bottom
  ctx.fillStyle = EARTH_D; ctx.beginPath(); ctx.moveTo(0, H);
  for (var x = 0; x <= W; x += 3) ctx.lineTo(x, Math.max(terrainY(x), GROUND + 130));
  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
  // lip highlight on terrain top
  ctx.strokeStyle = LIP; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0, terrainY(0));
  for (var x = 0; x <= W; x += 3) ctx.lineTo(x, terrainY(x)); ctx.stroke();

  // water — build a single path over wet columns, segment by segment (gaps where dry)
  drawWater();

  // pour streams (vertical wobbling sheet)
  ctx.fillStyle = POUR;
  for (var i = 0; i < pourStreams.length; i++) {
    var ps = pourStreams[i], by = surfYAt(ps.x) - 2;
    for (var y = ps.y; y < by; y += 6) { var wob = Math.sin(y * 0.12 + frame * 0.5) * 1.8; ctx.fillRect(ps.x - 4 + wob, y, 8, 6); }
  }

  // drops
  for (var i = 0; i < drops.length; i++) { var p = drops[i]; ctx.globalAlpha = Math.max(0, 1 - p.life / p.max) * 0.92; ctx.fillStyle = p.c; ctx.fillRect(p.x - p.sz / 2, p.y - p.sz / 2, p.sz, p.sz); }
  ctx.globalAlpha = 1;

  // ball
  if (!ball.gone) {
    var b = ball;
    ctx.save();
    if (b.sunk) ctx.globalAlpha = 0.78;
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 6.2832); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.20)';
    for (var a = 0; a < 3; a++) { ctx.beginPath(); ctx.arc(b.x + Math.cos(a * 2.094) * b.r * 0.42, b.y + Math.sin(a * 2.094) * b.r * 0.42, b.r * 0.22, 0, 6.2832); ctx.fill(); }
    ctx.restore();
  }

  // aim line + power
  if (aiming) {
    var dx = aimStart.x - aimNow.x, dy = aimStart.y - aimNow.y;
    var pw = Math.min(1, Math.hypot(dx, dy) / 140);
    ctx.setLineDash([6, 6]); ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(ball.x, ball.y); ctx.lineTo(ball.x + dx, ball.y + dy); ctx.stroke(); ctx.setLineDash([]);
    // power bar
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(ball.x - 26, ball.y - 30, 52, 7);
    ctx.fillStyle = pw > 0.8 ? '#e5613b' : (pw > 0.5 ? '#e0a93b' : '#5fc26b'); ctx.fillRect(ball.x - 25, ball.y - 29, 50 * pw, 5);
  }

  // hint
  if (hint > 0) {
    ctx.globalAlpha = Math.min(1, hint / 60);
    ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(20, 16, 430, 56);
    ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.font = '15px monospace';
    ctx.fillText('Click/HOLD above terrain → POUR water', 34, 40);
    ctx.fillText('Drag BACK from ball → aim+power, release → SHOOT', 34, 60);
    ctx.globalAlpha = 1;
    hint--;
  }
  // toolbar buttons
  drawButtons();
}

function drawWater() {
  // collect contiguous wet runs
  var i = 0;
  while (i < NC) {
    if (depth(i) <= 0.5) { i++; continue; }
    var s = i; while (i < NC && depth(i) > 0.5) i++;
    var e = i - 1;
    // path: surface across [s..e], then down terrain back
    function bodyPath() {
      ctx.beginPath();
      ctx.moveTo(colX(s), wy[s] + hh[s]);
      for (var j = s; j <= e; j++) ctx.lineTo(colX(j), wy[j] + hh[j]);
      for (var j = e; j >= s; j--) ctx.lineTo(colX(j), tY[j]);
      ctx.closePath();
    }
    ctx.fillStyle = WATER; bodyPath(); ctx.fill();
    var minWy = 9999, maxT = 0;
    for (var j = s; j <= e; j++) { if (wy[j] < minWy) minWy = wy[j]; if (tY[j] > maxT) maxT = tY[j]; }
    var wg = ctx.createLinearGradient(0, minWy, 0, maxT); wg.addColorStop(0, 'rgba(0,0,0,0)'); wg.addColorStop(1, DEEP);
    ctx.fillStyle = wg; bodyPath(); ctx.fill();
    // surface highlight
    ctx.strokeStyle = HI; ctx.lineWidth = 2; ctx.beginPath();
    ctx.moveTo(colX(s), wy[s] + hh[s]);
    for (var j = s; j <= e; j++) ctx.lineTo(colX(j), wy[j] + hh[j]);
    ctx.stroke();
  }
}

// ── BUTTONS ───────────────────────────────────────────────────────────────────
var BTNS = [
  { id: 'clear', label: 'CLEAR WATER', x: W - 300, y: 16, w: 130, h: 30 },
  { id: 'reset', label: 'RESET BALL', x: W - 160, y: 16, w: 130, h: 30 }
];
function drawButtons() {
  ctx.font = '13px monospace';
  for (var i = 0; i < BTNS.length; i++) {
    var b = BTNS[i];
    ctx.fillStyle = 'rgba(20,28,40,0.85)'; ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.strokeStyle = 'rgba(209,138,82,0.8)'; ctx.lineWidth = 1.5; ctx.strokeRect(b.x, b.y, b.w, b.h);
    ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(b.label, b.x + b.w / 2, b.y + b.h / 2);
  }
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}
function hitButton(x, y) {
  for (var i = 0; i < BTNS.length; i++) { var b = BTNS[i]; if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) return b.id; }
  return null;
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
var aiming = false, aimStart = { x: 0, y: 0 }, aimNow = { x: 0, y: 0 }, pouring = false, pourPos = null;
function evtPos(e) { var r = cv.getBoundingClientRect(); return { x: (e.clientX - r.left) * (cv.width / r.width), y: (e.clientY - r.top) * (cv.height / r.height) }; }
function nearBall(p) { return Math.hypot(p.x - ball.x, p.y - ball.y) < 34 && !ball.gone && !ball.sunk; }

cv.addEventListener('mousedown', function (e) {
  var p = evtPos(e);
  var bid = hitButton(p.x, p.y);
  if (bid === 'clear') { clearWater(); return; }
  if (bid === 'reset') { resetBall(); return; }
  if (nearBall(p)) { aiming = true; aimStart = p; aimNow = p; }
  else { pouring = true; pourPos = p; }
});
cv.addEventListener('mousemove', function (e) {
  var p = evtPos(e);
  if (aiming) aimNow = p;
  if (pouring) pourPos = p;
});
window.addEventListener('mouseup', function (e) {
  var p = evtPos(e);
  if (aiming) {
    var dx = aimStart.x - aimNow.x, dy = aimStart.y - aimNow.y;
    var pw = Math.min(1, Math.hypot(dx, dy) / 140);
    var spd = pw * 22;
    var ang = Math.atan2(dy, dx);
    ball.vx = Math.cos(ang) * spd; ball.vy = Math.sin(ang) * spd;
    ball.onGround = false; ball.sunk = false; ball.gone = false;
    aiming = false;
  }
  pouring = false; pourPos = null;
});

// ── PUBLIC HOOKS (for programmatic driving / tests) ───────────────────────────
window.__pour = function (x, y) { addPour(x, y == null ? 40 : y); };
window.__shoot = function (vx, vy) { ball.vx = vx; ball.vy = vy; ball.onGround = false; ball.sunk = false; };
window.__clearWater = clearWater;
window.__resetBall = resetBall;
window.__reset = reset;
window.__frame = function () { return frame; };
window.__state = function () { var maxd = 0, wet = 0; for (var i = 0; i < NC; i++) { if (depth(i) > 0.5) wet++; if (depth(i) > maxd) maxd = depth(i); } return { frame: frame, wetCols: wet, maxDepth: Math.round(maxd), ballSunk: ball.sunk, ballX: Math.round(ball.x), ballY: Math.round(ball.y), drops: drops.length }; };
var auto = true; window.__setAuto = function (a) { auto = a; };
window.__step = step;

// ── LOOP (init BEFORE rAF) ────────────────────────────────────────────────────
reset();
(function loop() {
  if (auto) {
    if (pouring && pourPos) addPour(pourPos.x, pourPos.y);   // continuous pour while held
    step();
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
