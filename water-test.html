<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Height-field water — showcase</title>
  <style>html,body{margin:0;background:#0c0e14;overflow:hidden}</style>
</head>
<body>
<canvas id="c" width="960" height="540"></canvas>
<script>
// ── HEIGHT-FIELD WATER (showcase) ─────────────────────────────────────────────
// Surface = a row of connected springs (heights h[] + velocities v[]): pulled to rest + coupled to
// neighbours = the wave equation. The ball splashes a dent + throws droplets; ripples propagate, reflect
// off the banks, settle. O(n)/frame. This page cycles a few WATER PALETTES to show it generalises.
var cv = document.getElementById('c'), ctx = cv.getContext('2d'), W = 960, H = 540;
var PX0 = 180, PX1 = 780, restY = 290, botY = 472;
var N = 170, dx = (PX1 - PX0) / (N - 1);
var h = new Float32Array(N), v = new Float32Array(N);

var SCENES = [
  { name: 'Ocean',    water: '#3a7ec8', deep: 'rgba(18,42,72,0.6)',  bank: '#c9743f', lip: '#d88f55', sky0: '#1a2230', sky1: '#26303c', hi: 'rgba(205,238,252,0.55)', drop: '#9bd4f2' },
  { name: 'Tidewell', water: '#1f9a86', deep: 'rgba(8,52,46,0.62)',  bank: '#8a7e6e', lip: '#a99c88', sky0: '#16222e', sky1: '#243038', hi: 'rgba(200,245,235,0.5)',  drop: '#8fe6d2' },
  { name: 'Ice melt', water: '#6ba8c7', deep: 'rgba(40,82,108,0.55)',bank: '#cabfa0', lip: '#ddd2b4', sky0: '#2a3a48', sky1: '#3a4a58', hi: 'rgba(235,250,255,0.6)', drop: '#cfeefb' },
  { name: 'Swamp',    water: '#3f7a55', deep: 'rgba(13,42,26,0.62)', bank: '#5a6b3c', lip: '#6e7d48', sky0: '#222a1e', sky1: '#2e3626', hi: 'rgba(200,235,200,0.45)',drop: '#9bd49b' },
  { name: 'Molten',   water: '#d9531f', deep: 'rgba(88,16,8,0.62)',  bank: '#46464f', lip: '#5a5a64', sky0: '#1c1216', sky1: '#28181a', hi: 'rgba(255,222,182,0.5)', drop: '#ffb070' }
];
var curScene = 0, sceneFrame = 0, PER_SCENE = 24;
var ball, drops, frame = 0;

function newBall() { return { x: 280 + Math.random() * 400, y: 200, vy: 8, r: 9, sunk: false, gone: false }; }
function reset() { h.fill(0); v.fill(0); curScene = 0; sceneFrame = 0; frame = 0; ball = newBall(); drops = []; draw(); }
window.__setScene = function (i) { curScene = ((i % SCENES.length) + SCENES.length) % SCENES.length; };

function splash(cx, speed) {
  speed = Math.min(speed, 16);
  var idx = Math.round((cx - PX0) / dx);
  for (var i = -5; i <= 5; i++) { var j = idx + i; if (j >= 1 && j < N - 1) v[j] -= speed * 0.55 * Math.exp(-i * i * 0.16); }
  var n = Math.round(5 + speed * 0.9);
  for (var d = 0; d < n; d++) {
    var ang = -Math.PI / 2 + (Math.random() - 0.5) * 1.7, sp = 1.4 + Math.random() * speed * 0.55;
    drops.push({ x: cx + (Math.random() - 0.5) * 18, y: restY - 3, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp * 1.3, life: 0, max: 22 + Math.random() * 16, sz: 1.5 + Math.random() * 2.2 });
  }
}

function stepWater() {
  var tension = 0.018, spread = 0.27, damping = 0.984;
  for (var i = 0; i < N; i++) { var l = i > 0 ? h[i - 1] : h[i], r = i < N - 1 ? h[i + 1] : h[i]; v[i] += (-tension * h[i]) + spread * ((l + r) * 0.5 - h[i]); v[i] *= damping; }
  for (var i = 0; i < N; i++) h[i] += v[i];
}
function surfYAtX(x) { var idx = Math.max(0, Math.min(N - 1, Math.round((x - PX0) / dx))); return restY + h[idx]; }

function step() {
  frame++; sceneFrame++;
  if (sceneFrame >= PER_SCENE) { curScene = (curScene + 1) % SCENES.length; h.fill(0); v.fill(0); ball = newBall(); drops = []; sceneFrame = 0; }
  if (!ball.gone) {
    if (!ball.sunk) { ball.vy += 0.5; ball.y += ball.vy; if (ball.y + ball.r >= restY) { splash(ball.x, ball.vy); ball.sunk = true; ball.vy *= 0.25; } }
    else { ball.vy = ball.vy * 0.8 + 0.35; ball.y += ball.vy; if (ball.y > botY - ball.r) { ball.y = botY - ball.r; ball.vy = 0; } if (ball.y > restY + 40) ball.gone = true; }
  }
  stepWater();
  for (var i = drops.length - 1; i >= 0; i--) {
    var p = drops[i]; p.life++; p.vy += 0.18; p.x += p.vx; p.y += p.vy;
    if (p.vy > 0 && p.y >= surfYAtX(p.x)) { var idx = Math.round((p.x - PX0) / dx); if (idx >= 1 && idx < N - 1) v[idx] -= 0.5; drops.splice(i, 1); continue; }
    if (p.life > p.max) drops.splice(i, 1);
  }
  draw();
}

function draw() {
  var SC = SCENES[curScene];
  var g = ctx.createLinearGradient(0, 0, 0, H); g.addColorStop(0, SC.sky0); g.addColorStop(1, SC.sky1);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = SC.bank; ctx.fillRect(0, restY, PX0, H); ctx.fillRect(PX1, restY, W - PX1, H); ctx.fillRect(0, botY, W, H - botY);
  ctx.fillStyle = SC.lip; ctx.fillRect(0, restY, PX0, 4); ctx.fillRect(PX1, restY, W - PX1, 4);
  function surfPath() { ctx.beginPath(); ctx.moveTo(PX0, restY + h[0]); for (var i = 1; i < N; i++) ctx.lineTo(PX0 + i * dx, restY + h[i]); ctx.lineTo(PX1, botY); ctx.lineTo(PX0, botY); ctx.closePath(); }
  ctx.fillStyle = SC.water; surfPath(); ctx.fill();
  var wg = ctx.createLinearGradient(0, restY, 0, botY); wg.addColorStop(0, 'rgba(0,0,0,0)'); wg.addColorStop(1, SC.deep);
  ctx.fillStyle = wg; surfPath(); ctx.fill();
  ctx.strokeStyle = SC.hi; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(PX0, restY + h[0]); for (var i = 1; i < N; i++) ctx.lineTo(PX0 + i * dx, restY + h[i]); ctx.stroke();
  for (var i = 0; i < drops.length; i++) { var p = drops[i]; ctx.globalAlpha = Math.max(0, 1 - p.life / p.max) * 0.92; ctx.fillStyle = SC.drop; ctx.fillRect(p.x - p.sz / 2, p.y - p.sz / 2, p.sz, p.sz); }
  ctx.globalAlpha = 1;
  if (!ball.gone) {
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, 6.2832); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    for (var a = 0; a < 3; a++) { ctx.beginPath(); ctx.arc(ball.x + Math.cos(a * 2.094) * ball.r * 0.42, ball.y + Math.sin(a * 2.094) * ball.r * 0.42, ball.r * 0.22, 0, 6.2832); ctx.fill(); }
  }
  ctx.fillStyle = 'rgba(255,255,255,0.92)'; ctx.font = '26px monospace'; ctx.fillText(SC.name, 26, 44);
  ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '13px monospace'; ctx.fillText('height-field water  ·  click to splash', 26, 66);
}

window.__step = step; window.__reset = reset; window.__frame = function () { return frame; };
var auto = true; window.__setAuto = function (a) { auto = a; };
(function loop() { if (auto) step(); requestAnimationFrame(loop); })();
cv.addEventListener('click', function (e) { var r = cv.getBoundingClientRect(); var x = (e.clientX - r.left) * (cv.width / r.width); if (x > PX0 && x < PX1) splash(x, 11); });
reset();
</script>
</body>
</html>
